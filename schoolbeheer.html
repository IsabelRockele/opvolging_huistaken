<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Klaslijsten</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --ink:#0b2341;--muted:#50658a;--line:#d7e0ec;--soft:#f4f7fb;
      --yellow:#ffdc63;--yellow-dark:#d5ad1f;--green:#bcebdc;--pink:#f6bec6;
      --blue:#e9f0f8;--white:#fff;--sidebar-bg:#f0f4f9;--sidebar-w:210px;
      --header-h:62px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:#f6f8fc;display:flex;flex-direction:column;min-height:100vh}

    /* ── TOPBAR ── */
    #topbar{
      height:var(--header-h);display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;background:linear-gradient(135deg,#6b5d52 0%,#8a7a6d 100%);color:#fff;flex-shrink:0;gap:12px;
    }
    #topbar .brand{font-size:16px;font-weight:800;white-space:nowrap}
    #topbar .meta{font-size:13px;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #topbar .tools{display:flex;gap:8px;align-items:center;flex-shrink:0}
    #topbar .tools button{
      background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
      color:#fff;border-radius:10px;padding:6px 12px;font-size:13px;cursor:pointer;
    }
    #topbar .tools button:hover{background:rgba(255,255,255,.25)}
    #topbar .pill-status{
      font-size:12px;padding:4px 10px;border-radius:999px;
      background:rgba(255,255,255,.15);white-space:nowrap;
    }
    #topbar .pill-status.saved{background:#bcebdc;color:#0b2341}

    /* ── LAYOUT ── */
    #shell{display:flex;flex:1;overflow:hidden}

    /* ── SIDEBAR ── */
    #sidebar{
      width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar-bg);
      border-right:1px solid var(--line);display:flex;flex-direction:column;
      overflow-y:auto;
    }
    .sb-section{padding:10px 0}
    .sb-label{
      font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;
      color:var(--muted);padding:6px 16px 4px;
    }
    .sb-item{
      display:flex;align-items:center;gap:9px;padding:9px 16px;
      font-size:14px;cursor:pointer;color:var(--ink);
      border-left:3px solid transparent;transition:background .12s;
    }
    .sb-item:hover{filter:brightness(.95)}
    .sb-item.active{font-weight:800;filter:brightness(.92)}

    /* Altijd zichtbare kleur per module */
    #navAdministratie{background:#fdf0e8;border-left-color:#d4845a;color:#7a3a1a}
    #navAdministratie .sb-icon{color:#d4845a}
    #navAdministratie.active{background:#fae0cc;border-left-color:#a0522d}

    #navKlaslijst{background:#eaf4ec;border-left-color:#5a8a63;color:#2d5c35}
    #navKlaslijst .sb-icon{color:#5a8a63}
    #navKlaslijst.active{background:#d4ecda;border-left-color:#3d6b47}

    #navRefter{background:#fdf4e0;border-left-color:#d99040;color:#7a5010}
    #navRefter .sb-icon{color:#d99040}
    #navRefter.active{background:#fae8c0;border-left-color:#a06010}

    #navActiviteiten{background:#edf0fa;border-left-color:#6b7abf;color:#3d4f99}
    #navActiviteiten .sb-icon{color:#6b7abf}
    #navActiviteiten.active{background:#d8ddf5;border-left-color:#3d4f99}

    #navAankopen{background:#faedf2;border-left-color:#c05a7a;color:#7a2a4a}
    #navAankopen .sb-icon{color:#c05a7a}
    #navAankopen.active{background:#f5d0dc;border-left-color:#8a2a4a}


    .sb-item .sb-icon{font-size:17px;width:20px;text-align:center;flex-shrink:0}
    .sb-divider{height:1px;background:var(--line);margin:4px 12px}

    /* klas-picker in sidebar */
    .sb-klas-wrap{padding:10px 12px 14px}
    .sb-klas-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
    .sb-klas-btn{
      padding:5px 10px;border-radius:10px;border:1px solid var(--line);
      background:#fff;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink);
    }
    .sb-klas-btn.active{background:#6b5d52;color:#fff;border-color:#6b5d52}
    .sb-klas-btn:hover:not(.active){background:#dde5f0}

    /* schooljaar input */
    .sb-schooljaar{padding:12px 14px 4px}
    .sb-schooljaar label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px}
    .sb-schooljaar input{
      width:100%;border:1px solid var(--line);border-radius:10px;
      padding:7px 10px;font-size:13px;background:#fff;
    }

    /* ── MAIN ── */
    #main{flex:1;overflow-y:auto;padding:22px 24px 48px;display:flex;flex-direction:column;gap:0}

    /* content panels */
    button,.pill,select,input,textarea{font:inherit}
    button,.pill{border:0;border-radius:16px;background:#edf2f8;color:var(--ink);padding:10px 16px;font-weight:800;cursor:pointer}
    button.primary,.pill.saved{background:var(--yellow);box-shadow:inset 0 0 0 1px var(--yellow-dark)}
    button.green{background:var(--green);color:#0b2341}
    button.pink{background:var(--pink);color:#0b2341}
    button.danger{background:#f6bec6;color:#0b2341}
    button.white{background:#fff;border:1px solid var(--line)}
    button.small{padding:6px 10px;border-radius:12px;font-size:13px}
    h1{font-size:26px;margin:0 0 6px}
    h2{font-size:20px;margin:0 0 8px}
    h3{font-size:16px;margin:0 0 8px}
    p{margin:0 0 10px}
    .muted{color:var(--muted)}
    .small{font-size:13px}
    .strong{font-weight:800}
    input,select,textarea{border:1px solid var(--line);border-radius:12px;padding:9px 12px;background:#fff;width:100%}
    input[type="checkbox"]{width:18px;height:18px;padding:0;margin:0;vertical-align:middle;accent-color:#2f8f67}
    td input[type="checkbox"],th input[type="checkbox"]{display:block;margin:0 auto}
    .check-label{display:inline-flex!important;align-items:center;gap:8px;margin:10px 0!important}
    .check-label input[type="checkbox"]{flex:0 0 auto}
    textarea{min-height:96px;resize:vertical}
    .panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;margin-bottom:16px}
    .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;align-items:end}
    .notice{background:#fff8d6;border:1px solid #f2c94c;border-radius:14px;padding:14px;margin:12px 0}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px;background:#fff}
    table{border-collapse:collapse;width:100%;min-width:760px}
    th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:middle}
    th{background:#eef3f9;color:#536985;text-transform:uppercase;font-size:12px;letter-spacing:.03em}
    td.day,th.day{text-align:center;min-width:42px}
    .grey{background:#edf0f4;color:#91a0b5}
    .locked{background:#dcf5ea}
    .locked-head{background:#bcebdc!important;color:#0b2341}
    .colleague{background:#fff5c8}
    .tag{display:inline-block;border-radius:999px;background:#edf2f8;padding:4px 8px;font-size:12px;margin-left:6px}
    .tag.green{background:#d8f5e9}.tag.done{background:#c9efd9}
    .th-sub{display:block;margin-top:3px;font-size:10px;font-weight:600;text-transform:none;letter-spacing:0;color:var(--muted)}
    .homework-cell{min-width:170px;text-align:left!important}
    .homework-cell label{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px;font-weight:800;color:var(--ink)}
    .mf-klas { margin-bottom: 32px; }
    .mf-klas-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
    .mf-klas-header h3 { margin:0; font-size:1.15rem; }
    .mf-vaste-rij td { background:#fffbeb; }
    tfoot tr td { padding: 10px 12px; }
    .mf-tab-btn { padding:6px 16px; border:2px solid #d0d7de; border-radius:8px; background:#fff; cursor:pointer; font-weight:600; font-size:0.95rem; font-family:inherit; color:#444; }
    .mf-tab-btn:hover { background:#f0f4f8; }
    .mf-tab-active { background:#0a66c2 !important; color:#fff !important; border-color:#0a66c2 !important; }
    .teacher-lock{display:inline-block;margin-top:3px;font-size:13px}
    .status-dot{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:999px;font-weight:900}
    .status-dot.present{background:#dff7e8;color:#176f3b}
    .status-dot.absent{background:#ffd8d8;color:#b42318}
    .absence-check{width:22px;height:22px;accent-color:#e25a5a}
    .subnav{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
    .subnav button.active{background:var(--yellow);box-shadow:inset 0 0 0 1px var(--yellow-dark)}
    .right{margin-left:auto}
    .name-input{min-width:140px}
    .hidden{display:none!important}

    /* step-grid voor nieuw schooljaar */
    .step-grid{display:grid;grid-template-columns:1fr 1fr auto;gap:14px;align-items:end;margin-bottom:14px}
    .step-card{background:var(--soft);border:1px solid var(--line);border-radius:14px;padding:14px}
    .action-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}

    /* melding-balk */
    #messages .notice{margin-bottom:8px}
    /* schoolbeheer-meldingenbeheer-codex */
    .message-admin-layout{display:grid;grid-template-columns:minmax(280px,.9fr) minmax(320px,1.1fr);gap:16px;align-items:start;margin-top:10px}
    .message-admin-card{border:1px solid var(--line);border-radius:16px;background:#fbfcfe;padding:16px}
    .message-admin-card h3{margin-bottom:6px}
    .message-list{display:flex;flex-direction:column;gap:10px}
    .message-card{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px}
    .message-card.late{border-color:#e25a5a;background:#fff2f2}
    .message-card.archived{opacity:.72;background:#f4f6f9}
    .message-card .bar{align-items:flex-start}
    .message-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .message-status{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .message-status span{border-radius:999px;background:#edf2f8;padding:4px 8px;font-size:12px}
    .message-status span.done{background:#d8f5e9}
    .message-status span.open{background:#fff5c8}
    .message-status span.late{background:#ffd8d8}
    @media(max-width:900px){.message-admin-layout{grid-template-columns:1fr}.message-actions{justify-content:flex-start}}
    /* codex-checkbox-centering-fix */
    th.check-col,
    td.check-col,
    th.activity-col,
    td.activity-col,
    td.checkbox-cell{
      text-align:center!important;
      vertical-align:middle!important;
    }
    th.check-col,
    td.check-col{
      width:140px;
      min-width:120px;
      max-width:160px;
    }
    th.activity-col,
    td.activity-col{
      min-width:150px;
    }
    td.check-col input[type="checkbox"],
    td.checkbox-cell input[type="checkbox"],
    td.activity-col input[type="checkbox"],
    td.activity-cell input[type="checkbox"]{
      display:block!important;
      margin-left:auto!important;
      margin-right:auto!important;
    }
    td.activity-col .teacher-lock,
    td.activity-cell .teacher-lock{
      display:block;
      margin-top:4px;
      text-align:center;
    }
    td.activity-col .status-dot,
    td.activity-cell .status-dot{
      margin-left:auto;
      margin-right:auto;
    }
    /* codex-classlist-layout-fix */
    .class-admin-compact{
      background:#fffdf0;
      border:1px solid #f2d36b;
      border-radius:14px;
      padding:14px 16px;
      margin:8px 0 16px;
    }
    .class-admin-compact h3{margin-bottom:4px}
    .class-admin-compact .row{
      grid-template-columns:minmax(180px,260px) minmax(150px,210px) minmax(180px,240px);
      align-items:end;
    }
    .class-list-tools{
      display:grid;
      grid-template-columns:minmax(300px,1.05fr) minmax(300px,.95fr);
      gap:18px;
      align-items:start;
      margin-top:12px;
    }
    .class-tool-card{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fbfcfe;
      padding:16px;
      min-height:100%;
    }
    .class-tool-card h3{margin-bottom:6px}
    .class-tool-card textarea{min-height:118px}
    .student-add-form{
      display:grid;
      grid-template-columns:repeat(3,minmax(130px,1fr));
      gap:12px;
      align-items:end;
    }
    .student-add-actions{
      display:flex;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .student-add-actions .check-label{margin:0!important}
    .student-add-actions button{margin-left:auto}
    .class-list-heading{
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:12px;
      margin-top:22px;
      margin-bottom:8px;
    }
    @media(max-width:900px){
      .class-list-tools{grid-template-columns:1fr}
      .student-add-form{grid-template-columns:1fr}
      .student-add-actions button{margin-left:0;width:100%}
      .class-admin-compact .row{grid-template-columns:1fr}
    }
    /* codex-classlist-collapsed-tools */
    .class-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin:14px 0 12px;
      padding:10px;
      background:#f6f8fc;
      border:1px solid var(--line);
      border-radius:14px;
    }
    .class-actions button{
      border-radius:12px;
      padding:9px 14px;
    }
    .class-actions .hint{
      margin-left:auto;
      font-size:13px;
      color:var(--muted);
    }
    .class-tool-panel{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      padding:16px;
      margin:0 0 16px;
    }
    .class-tool-panel.compact-warning{
      background:#fffdf0;
      border-color:#f2d36b;
    }
    .student-add-actions{
      display:flex;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .student-add-actions .check-label{margin:0!important}
    .student-add-actions button{margin-left:auto}
    @media(max-width:900px){
      .class-actions .hint{width:100%;margin-left:0}
      .student-add-actions button{margin-left:0;width:100%}
    }
    /* codex-help-print-tools */
    .screen-tools{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      margin-left:auto;
    }
    .help-panel{
      display:none;
      margin:12px 0;
      padding:14px 16px;
      background:#eef7ff;
      border:1px solid #b8d7f2;
      border-radius:14px;
      color:var(--ink);
    }
    .help-panel.open{display:block}
    .help-panel h3{margin-bottom:6px}
    .help-panel ul{margin:8px 0 0 18px;padding:0}
    .help-panel li{margin:4px 0}
    .screen-tools button{border-radius:12px;padding:7px 11px;font-size:13px}
    @media print{
      .screen-tools,.help-panel,.no-print{display:none!important}
    }





    /* responsive */
    @media(max-width:800px){
      #sidebar{display:none}
      #main{padding:14px}
      .two{grid-template-columns:1fr}
      .step-grid{grid-template-columns:1fr}
    }
    @media print{
      #topbar,#sidebar,.no-print,button,input,select,textarea{display:none!important}
      #main{padding:0}
      .panel{box-shadow:none;border:0;margin:0}
      .table-wrap{overflow:visible;border:0}
      table{min-width:0;font-size:12px}
    }
    /* codex-print-pdf-table-fix */
    @page{
      size: A4 landscape;
      margin: 8mm;
    }
    @media print{
      html,body{
        background:#fff!important;
        color:#000!important;
        font-size:10px!important;
      }
      #topbar,#sidebar,.no-print,button,.screen-tools,.help-panel{
        display:none!important;
      }
      #shell,#main{
        display:block!important;
        overflow:visible!important;
        padding:0!important;
        width:100%!important;
      }
      .panel{
        border:0!important;
        box-shadow:none!important;
        padding:0!important;
        margin:0!important;
      }
      .bar{
        display:block!important;
        margin-bottom:6px!important;
      }
      h1,h2{
        font-size:16px!important;
        margin:0 0 4px!important;
      }
      h3{
        font-size:12px!important;
        margin:0 0 4px!important;
      }
      p,.muted{
        font-size:10px!important;
        color:#222!important;
        margin:0 0 5px!important;
      }
      .table-wrap{
        overflow:visible!important;
        border:0!important;
        border-radius:0!important;
        width:100%!important;
      }
      table{
        width:100%!important;
        min-width:0!important;
        table-layout:fixed!important;
        border-collapse:collapse!important;
        font-size:9px!important;
      }
      th,td{
        border:1px solid #555!important;
        padding:3px 4px!important;
        color:#000!important;
        background:#fff!important;
        vertical-align:middle!important;
      }
      th{
        background:#e6e6e6!important;
        font-weight:700!important;
      }
      td.day,th.day{
        min-width:0!important;
        width:auto!important;
        text-align:center!important;
        padding:2px!important;
      }
      .grey{
        background:#ddd!important;
        color:#555!important;
      }
      .locked,.locked-head{
        background:#d8f0df!important;
      }
      .colleague{
        background:#fff2b8!important;
      }
      .tag,.teacher-lock{
        display:none!important;
      }
      input[type="checkbox"]{
        appearance:none!important;
        -webkit-appearance:none!important;
        width:9px!important;
        height:9px!important;
        border:1px solid #333!important;
        display:inline-block!important;
        margin:0 auto!important;
        background:#fff!important;
      }
      input[type="checkbox"]:checked{
        background:#111!important;
        box-shadow:inset 0 0 0 2px #fff!important;
      }
    }
    /* codex-refter-print-readable */
    .print-absence{display:none}
    @media print{
      .refter-print-table{
        table-layout:fixed!important;
        width:100%!important;
        font-size:7.5px!important;
      }
      .refter-print-table th,
      .refter-print-table td{
        border:1px solid #333!important;
        padding:1.5px 2px!important;
        line-height:1.05!important;
        height:14px!important;
      }
      .refter-print-table th:first-child,
      .refter-print-table td:first-child{
        width:38mm!important;
        min-width:38mm!important;
        max-width:38mm!important;
        white-space:normal!important;
        overflow:visible!important;
        word-break:normal!important;
        overflow-wrap:normal!important;
        font-size:7.2px!important;
        text-align:left!important;
      }
      .refter-print-table th.day,
      .refter-print-table td.day{
        width:7mm!important;
        min-width:7mm!important;
        max-width:7mm!important;
        text-align:center!important;
        padding:1px!important;
      }
      .refter-print-table input[type="checkbox"]{
        display:none!important;
      }
      .refter-print-table .print-absence{
        display:inline!important;
        font-weight:800!important;
        font-size:8px!important;
      }
      .refter-print-table .print-absence.empty{
        color:transparent!important;
      }
      .refter-print-table .grey{
        background:#e1e1e1!important;
      }
      .refter-print-table .colleague td:first-child{
        background:#fff2b8!important;
      }
      .refter-print-table .tag,
      .refter-print-table .teacher-lock{
        display:none!important;
      }
      .refter-print-table strong{
        font-weight:700!important;
      }
    }
    /* collega-kind: reftercellen zijn streepjes, niet klikbaar */
    tr.colleague td.day{
      cursor: default;
    }
    td.collega-dag{
      background: #fff5c8;
      color: #a08a00;
      text-align: center;
      cursor: default;
    }
    /* codex-refter-print-grey-colleague */
    @media print{
      .refter-print-table th.day.grey,
      .refter-print-table td.day.grey{
        background:#cfcfcf!important;
        color:#444!important;
      }
      .refter-print-table tr.colleague td{
        background:#fff1a8!important;
      }
      .refter-print-table tr.colleague td.day.grey{
        background:#d7d0ad!important;
      }
      .refter-print-table tr.colleague td.locked{
        background:#d7ead0!important;
      }
      .refter-print-table tr.colleague td:first-child{
        font-weight:800!important;
      }
    }
    /* codex-refter-print-force-colors-31-days */
    @media print{
      *{
        -webkit-print-color-adjust:exact!important;
        print-color-adjust:exact!important;
      }
      .refter-print-table{
        table-layout:fixed!important;
        width:100%!important;
        max-width:100%!important;
      }
      .refter-print-table th:first-child,
      .refter-print-table td:first-child{
        width:31mm!important;
        min-width:31mm!important;
        max-width:31mm!important;
        font-size:6.8px!important;

  <script type="module">

    const firebaseConfig = {

    const DEFAULT_CLASSES = ["K1","K2","K3","1A","2A","3A","4A","5A","6A"];

    const uid = () => Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4);

    const helpTexts = {
      administratie: `<h3>Uitleg administratie</h3><ul><li><strong>Klaslijsten</strong>: leerlingen toevoegen, namen verbeteren, kind van collega aanduiden en uitschrijven.</li><li><strong>Vrije dagen</strong>: extra vrije dagen of studiedagen ingeven. Weekends en woensdagen zijn automatisch grijs.</li><li><strong>Meldingen</strong>: secretariaat stuurt taken naar klassen. Leerkrachten vinken aan wanneer het klaar is.</li><li><strong>Nieuw schooljaar</strong>: leerlingen doorschuiven, zittenblijvers aanduiden en klasleerkrachten klaarzetten.</li></ul>`,
      klaslijst: `<h3>Uitleg klaslijst</h3><ul><li>Gebruik <strong>Klaslijst plakken</strong> vooral bij een volledig nieuwe klas.</li><li>Gebruik <strong>Nieuwe leerling</strong> voor een leerling die later start.</li><li><strong>Standaard</strong> betekent: startdatum 1/09 van het schooljaar en einddatum 30/06 van dat schooljaar.</li><li>Namen kan je rechtstreeks in de tabel verbeteren.</li><li>Uitschrijven bewaart oudere gegevens voor lijsten en afrekeningen.</li></ul>`,
      refter: `<h3>Uitleg refter</h3><ul><li>Leerkrachten vinken enkel kinderen aan die afwezig zijn.</li><li>Grijze dagen tellen niet mee.</li><li>Kinderen van collega's krijgen een zachte kleur en betalen geen refter.</li><li>Als secretariaat <strong>Verwerkt tot</strong> invult, worden die dagen vergrendeld bij de leerkracht.</li></ul>`,
      activiteiten: `<h3>Uitleg activiteiten</h3><ul><li>Leerkrachten voegen de activiteit toe met datum en prijs.</li><li>Daarna vinken ze alleen afwezige leerlingen aan.</li><li>Secretariaat ziet groen voor aanwezig en rood voor afwezig.</li><li>Wanneer secretariaat verwerkt aanvinkt, kan de leerkracht die activiteit niet meer wijzigen.</li></ul>`,
      aankopen: `<h3>Uitleg aankopen</h3><ul><li>Leerkrachten voegen aankopen toe zoals badmuts of turnshirt.</li><li>De prijs kan bij het toevoegen nog aangepast worden.</li><li>Secretariaat kan aankopen nakijken en als verwerkt aanduiden.</li></ul>`,
      werkboeken: `<h3>Uitleg werkboeken</h3><ul><li>Dit onderdeel werken we later verder uit.</li><li>Hier komt het overzicht voor werkboeken en materiaalbestellingen.</li></ul>`
    };
    function screenTools(key){
      return `<div class="screen-tools no-print"><button class="white small" onclick="toggleHelp('${key}')">? Uitleg</button><button class="white small" onclick="window.print()">PDF / afdrukken</button></div>`;
    }
    function helpPanel(key){
      return `<section id="help-${key}" class="help-panel">${helpTexts[key] || ""}</section>`;
    }
    window.toggleHelp = key => {
      const box = $("help-" + key);
      if(box) box.classList.toggle("open");
    };
    function schoolMonths(){
      const start = Number(String(schooljaar).slice(0,4));
      const end = Number(String(schooljaar).slice(5,9));
      return [`${start}-09`,`${start}-10`,`${start}-11`,`${start}-12`,`${end}-01`,`${end}-02`,`${end}-03`,`${end}-04`,`${end}-05`,`${end}-06`];
    }
    function laatsteOpenRefterDag(month){
      return [...daysInMonth(month)].reverse().find(d => !isFree(d.date))?.date || "";
    }
    function refterMaandVolledigVerwerkt(month){
      const laatste = laatsteOpenRefterDag(month);
      const verwerkt = processedInMonth(month);
      return !!laatste && !!verwerkt && verwerkt >= laatste;
    }
    function standaardRefterMaand(){
      const gekozen = $("refterMonth")?.value;
      if(gekozen) return gekozen;
      return schoolMonths().find(m => !refterMaandVolledigVerwerkt(m)) || schoolMonths().at(-1);
    }
    function setStatus(text, saved=false){
      $("status").textContent = text;
      $("status").classList.toggle("saved", saved);
    }
    function isBeheerder(){ return role === "beheerder"; }
    function isSecretary(){ return role === "secretariaat" || isBeheerder(); }
    // schoolbeheer-zorgleerkrachten-codex
    function isSchoolBreedRole(){ return isBeheerder() || ["directie","zorgcoordinator","zorgleerkracht"].includes(role); }
    function canOpenAllClasses(){ return isSecretary() || isSchoolBreedRole(); }
    const BEWAAR_JAREN_SCHOOLBEHEER = 2; // Aanpasbaar: klaslijsten, refter, activiteiten en aankopen bewaren tot eind augustus na dit aantal schooljaren.
    function startDate(){ return `${schooljaar.slice(0,4)}-09-01`; }
    function endDate(){ return `${schooljaar.slice(5,9)}-06-30`; }
    function bewaarTotVoorSchooljaar(jaar=schooljaar, extraJaren=BEWAAR_JAREN_SCHOOLBEHEER){
      return `${Number(String(jaar).slice(0,4)) + extraJaren}-08-31`;
    }
    function emptyClassDoc(klas){ return { schooljaar, klas, leerlingen:[], refter:{}, activiteiten:[], aankopen:[], vrijeDagen:[...standardFree], messages:[], processed:{refter:""}, bewaarTot:bewaarTotVoorSchooljaar(), bewaartermijnJaren:BEWAAR_JAREN_SCHOOLBEHEER, bijgewerktOp:new Date().toISOString() }; }
    function classRef(klas=activeClass){ return doc(db, "schoolbeheer", schooljaar, "klassen", klas); }
    function schooljaarOffset(jaar, offset){
      const start = Number(String(jaar || schooljaar).slice(0,4)) + offset;
      return `${start}-${start + 1}`;
    }
    function name(s){ const last = s.last || s.lastName || ""; const first = s.first || s.firstName || ""; return `${last}, ${first}`.replace(/^, /,"").replace(/, $/,""); }
    function activeStudents(date=`${schooljaar.slice(0,4)}-09-15`){ return (data?.leerlingen||[]).filter(s => (!s.start || s.start <= date) && (!s.end || s.end >= date)).sort((a,b)=>name(a).localeCompare(name(b),"nl")); }

    function setActiveNav(tabName){
      document.querySelectorAll(".sb-item").forEach(el => {
        el.classList.toggle("active", el.dataset.tab === tabName);
      });
    }

    function renderScope(){
            $("topMeta").textContent = `${user.email} - ${isBeheerder() ? "beheerder" : isSecretary() ? "secretariaat" : isSchoolBreedRole() ? role : "klasleerkracht"} - ${schooljaar}`;
      document.querySelectorAll(".secretary-only").forEach(x => x.classList.toggle("hidden", !isSecretary()));
      document.querySelectorAll(".teacher-label").forEach(x => x.classList.toggle("hidden", isSecretary()));
      document.querySelectorAll(".secretary-label").forEach(x => x.classList.toggle("hidden", !isSecretary()));
      renderKlasPills();
      setActiveNav(tab);
    }

    function renderKlasPills(){
      const lijst = canOpenAllClasses() ? allClasses : allowedClasses;
      $("klasPills").innerHTML = lijst.map(k =>
        `<button class="sb-klas-btn ${k===activeClass?"active":""}" onclick="openClass('${esc(k)}')">${esc(k)}</button>`
      ).join("");
    }

    async function loadRole(){
      const snap = await getDoc(doc(db, "schoolrollen", user.uid));
      role = snap.exists() ? String(snap.data().rol || "").trim().toLowerCase() : "";
      if(role === "beheerder"){
        const simulated = localStorage.getItem("lindeSimuleerRol_" + user.uid);
        if(["klasleerkracht","zorgleerkracht","secretariaat","beheerder"].includes(simulated)){
          role = simulated;
        }
      }
    }

    async function loadClassesFromFirebase(){
      const docs = await getDocs(collection(db, "schoolbeheer", schooljaar, "klassen"));
      const found = docs.docs.map(d => d.id);
      allClasses = [...new Set([...DEFAULT_CLASSES, ...found])].sort((a,b)=>a.localeCompare(b,"nl",{numeric:true}));
    }

    async function loadAllowedClasses(){
      if(canOpenAllClasses()){
        await loadClassesFromFirebase();
        allowedClasses = [...allClasses];
        return;
      }
      const email = (user.email || "").toLowerCase();
      const uidQuery = query(collection(db, "klasleerkrachten"), where("leerkracht_uids", "array-contains", user.uid));
      const emailQuery = query(collection(db, "klasleerkrachten"), where("leerkracht_emails", "array-contains", email));
      const snaps = await Promise.all([getDocs(uidQuery), getDocs(emailQuery)]);
      const found = new Set();
      snaps.forEach(s => s.docs.forEach(d => {
        const item = d.data();
        if(String(item.schooljaar || schooljaar) === schooljaar && item.klas) found.add(String(item.klas).trim());
      }));
      allowedClasses = [...found].sort((a,b)=>a.localeCompare(b,"nl",{numeric:true}));
      allClasses = [...new Set([...DEFAULT_CLASSES, ...allowedClasses])];
    }

    window.openClass = async function(klas){
      activeClass = klas;
      schooljaar = $("schooljaarInput").value.trim() || schooljaar;

      if(unsub) unsub();
      setStatus("Laden...");
      $("content").innerHTML = `<div class="panel"><h2>Laden</h2><p class="muted">We halen ${esc(activeClass)} op.</p></div>`;
      unsub = onSnapshot(classRef(), snap => {
        if(!snap.exists()){
          data = null;
          $("messages").innerHTML = "";
          toonKlasNietGestart(activeClass);
          setStatus("Nog niet gestart");
          return;
        }
        data = snap.data();
        normalize();
        if(isSecretary() && tab === "klaslijst") tab = "administratie";
        if(!isSecretary() && tab === "administratie") tab = "klaslijst";
        setStatus("Bewaard", true);
        setActiveNav(tab);
        render();
        renderKlasPills();
      }, err => {
        console.error(err);
        $("content").innerHTML = `<div class="panel"><h2>Laden mislukt</h2><p class="muted">${esc(err.message)}</p></div>`;
        setStatus("Fout");
      });
    };

    async function toonKlasNietGestart(klas){
      const vorige = schooljaarOffset(schooljaar, -1);
      const volgende = schooljaarOffset(schooljaar, 1);
      const kandidaten = [];
      for (const jaar of [vorige, volgende]) {
        const snap = await getDoc(doc(db, "schoolbeheer", jaar, "klassen", klas));
        if (snap.exists()) {
          const aantal = (snap.data().leerlingen || []).length;
          if (aantal > 0) kandidaten.push({ jaar, data: snap.data(), aantal });
        }
      }
      $("content").innerHTML = `<div class="panel">
        <h2>Klas nog niet gestart</h2>
        <p class="muted">${isSecretary() ? "Deze klas bestaat nog niet in " + esc(schooljaar) + "." : "Secretariaat moet deze klas eerst starten."}</p>

          <strong>Staat deze klas al in dashboard?</strong>
          <p class="muted">Je kan ${esc(klas)} voor ${esc(schooljaar)} starten met de namen die de klasleerkracht al in dashboard gebruikt. Er wordt een nieuwe klaslijst gemaakt; er wordt niets uit dashboard gewist.</p>
          <button class="green" onclick="startKlasUitDashboard('${esc(klas)}')">Start ${esc(klas)} met namen uit dashboard</button>
        </div>`:""}
        ${kandidaten.length ? `<div class="notice" style="margin-top:14px">
          <strong>Ik vond ${esc(klas)} wel in een ander schooljaar.</strong>
          <p class="muted">Waarschijnlijk staat je huidige klaslijst nog onder het verkeerde schooljaar. Je kan de klaslijst veilig kopieren naar ${esc(schooljaar)}. Bestaande gegevens in het andere schooljaar blijven staan.</p>
          <div class="row">${kandidaten.map(k => `<button class="green" onclick="kopieerKlasUitAnderSchooljaar('${esc(k.jaar)}','${esc(klas)}')">Kopieer uit ${esc(k.jaar)} (${k.aantal} leerlingen)</button>`).join("")}</div>
        </div>` : `<p class="muted">${isSecretary() ? "Ga naar Administratie > Klaslijsten en gebruik Klassen beheren om de klas te starten." : ""}</p>`}

    window.kopieerKlasUitAnderSchooljaar = async function(bronJaar, klas){
      if(!isSecretary()) return alert("Alleen secretariaat kan een klaslijst herstellen.");
      const bronSnap = await getDoc(doc(db, "schoolbeheer", bronJaar, "klassen", klas));
      if(!bronSnap.exists()) return alert(`Geen klas ${klas} gevonden in ${bronJaar}.`);
      const doelRef = doc(db, "schoolbeheer", schooljaar, "klassen", klas);
      const doelSnap = await getDoc(doelRef);
      if(doelSnap.exists()) return alert(`${klas} bestaat intussen al in ${schooljaar}. Herlaad de klas.`);
      const bron = bronSnap.data();
      const doel = emptyClassDoc(klas);
      doel.leerlingen = (bron.leerlingen || []).map(s => ({
        ...s,
        id: uid(),
        start: startDate(),
        end: endDate()
      }));
      doel.gekopieerdVanSchooljaar = bronJaar;
      doel.bijgewerktOp = new Date().toISOString();
      await setDoc(doelRef, doel);
      alert(`${klas} is gekopieerd van ${bronJaar} naar ${schooljaar}.`);
      await openClass(klas);
    };

    window.herstelLeerlingDatumsHuidigSchooljaar = async function(){
      if(!isSecretary() || !data) return;
      const ok = confirm(`Start- en einddatums van alle leerlingen in ${activeClass} aanpassen naar ${schooljaar}?`);
      if(!ok) return;
      data.leerlingen = (data.leerlingen || []).map(s => ({...s, start:startDate(), end:endDate()}));

      render();
      alert(`Leerlingdatums hersteld naar ${schooljaar}.`);
    };

    async function startClass(){
      if(!isSecretary()) return;
      schooljaar = $("schooljaarInput").value.trim() || schooljaar;

      if(!nieuweKlas) return alert("Typ eerst een klasnaam, bijvoorbeeld 2B.");
      const ref = doc(db, "schoolbeheer", schooljaar, "klassen", nieuweKlas);
      const bestaand = await getDoc(ref);
      if(!bestaand.exists()) await setDoc(ref, emptyClassDoc(nieuweKlas));
      $("nieuweKlasInput").value = "";

    async function deleteCurrentClass(){
      if(!isSecretary() || !activeClass) return;
      const ok = prompt(`Typ ${activeClass} om deze klas te verwijderen.`);
      if(ok !== activeClass) return;
      await deleteDoc(classRef(activeClass));

      data.vrijeDagen ||= [...standardFree];

    // ── MAXIMUMFACTUUR (code ook beschikbaar in maximumfactuur.js) ──
    // Standaardlimieten - worden overschreven door Firestore-instellingen
    const MF_LIMIET_STANDAARD = { lager: 105, kleuter: 55 };

    function isKleuterklas(klas) {
      // Klassen die beginnen met K (K1, K2, K3...) zijn kleuterklassen
      return /^K/i.test(klas || "");
    }

    function mfLimietVoorKlas(klas) {
      const l = mfLimiet();
      return isKleuterklas(klas) ? l.kleuter : l.lager;
    }

    function mfLimiet() {
      const inst = window._mfInstellingen || {};
      return {
        lager:   Number(inst.limLager   ?? MF_LIMIET_STANDAARD.lager),
        kleuter: Number(inst.limKleuter ?? MF_LIMIET_STANDAARD.kleuter)
      };
    }

      try {

      } catch(e) {
        window._mfInstellingen = {};
      }

        <div class="mf-tabs no-print" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">

    window.mfVasteToevoegen = async function(klas) {
      const naam = document.getElementById(`mfNaam-${klas}`)?.value?.trim();
      const prijs = Number(document.getElementById(`mfPrijs-${klas}`)?.value || 0);
      const datum = document.getElementById(`mfDatum-${klas}`)?.value?.trim();
      if (!naam) return alert("Vul een omschrijving in.");
      const snap = await getDoc(classRef(klas));
      const kd = snap.exists() ? snap.data() : {};
      if (!Array.isArray(kd.vastePosten)) kd.vastePosten = [];
      kd.vastePosten.push({ naam, prijs, datum: datum || "" });
      kd.bijgewerktOp = new Date().toISOString();
      await setDoc(classRef(klas), kd);
      renderMaximumfactuur();
    };

    window.mfVasteVerwijderen = async function(klas, index) {
      if (!confirm("Vaste post verwijderen?")) return;
      const snap = await getDoc(classRef(klas));
      if (!snap.exists()) return;
      const kd = snap.data();
      if (!Array.isArray(kd.vastePosten)) return;
      kd.vastePosten.splice(index, 1);
      kd.bijgewerktOp = new Date().toISOString();
      await setDoc(classRef(klas), kd);
      renderMaximumfactuur();
    };

    window.mfWisselKlas = function(klas) {
      window._mfActieveKlas = klas;
      renderMaximumfactuur();
    };

    window.mfSlaLimietenOp = async function() {
      const kleuter = Number(document.getElementById("mfLimKleuter")?.value ?? 55);
      const lager   = Number(document.getElementById("mfLimLager")?.value   ?? 105);
      if (isNaN(kleuter) || isNaN(lager) || kleuter < 0 || lager < 0) return alert("Vul geldige bedragen in.");
      await slaaMfInstellingenOp({ limKleuter: kleuter, limLager: lager });
      renderMaximumfactuur();
    };

    window.mfAfdrukken = function(klas) {
      const kd = window._mfKlassenData?.[klas];
      if (kd) mfDownloadPDF([klas], { [klas]: kd });
      else alert("Data niet geladen. Probeer opnieuw.");
    };

    window.mfAllesAfdrukken = function() {
      const klassen = window._mfKlassen;
      const klassenData = window._mfKlassenData;
      if (!klassen || !klassenData) { alert("Data niet geladen. Probeer opnieuw."); return; }
      mfDownloadPDF(klassen, klassenData);
    };

    async function mfDownloadPDF(klassen, klassenData) {
      // Controleer of jsPDF beschikbaar is
      if (typeof window.jspdf === "undefined") {
        alert("PDF-library niet geladen. Zorg dat jspdf.umd.min.js in dezelfde map staat als schoolbeheer.html.");
        return;
      }
      const { jsPDF } = window.jspdf;

      const sj = schooljaar || "";
      const delen = (sj || "-").split("-");
      const sj1 = delen[0] || "", sj2 = delen[1] || "";
      const periodeLabel = (sj1 && sj2) ? ("september " + sj1 + " tot en met juni " + sj2) : "dit schooljaar";
      const limiet = mfLimiet();
      const logoUrl = "afbeeldingen/schoollogo.png";

      // Logo ophalen als base64
      var logoBase64 = null;
      try {
        var resp = await fetch(logoUrl);
        if (resp.ok) {
          var buf = await resp.arrayBuffer();
          var bytes = new Uint8Array(buf);
          var binary = "";
          bytes.forEach(function(b) { binary += String.fromCharCode(b); });
          logoBase64 = "data:image/png;base64," + btoa(binary);
        }
      } catch(e) {}

      function prijsStr(bedrag) {
        return "\u20ac " + Number(bedrag).toFixed(2).replace(".", ",");
      }

      var doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
      var BLAUW = [26, 82, 118];
      var LICHTBLAUW = [213, 232, 240];
      var GRIJS = [248, 249, 250];
      var GEEL = [255, 251, 235];
      var GROEN_BG = [240, 250, 240];
      var ROOD_BG = [253, 232, 232];
      var pageW = 210, pageH = 297;
      var marginL = 15, marginR = 15, contentW = pageW - marginL - marginR;

      klassen.forEach(function(klas, klasIdx) {
        if (klasIdx > 0) doc.addPage();

        var kd = klassenData[klas] || {};
        var activiteiten = (kd.activiteiten || []).filter(function(a) {
          return (a.naam || a.name) && Number(a.prijs || a.price || 0) > 0;
        }).sort(function(a, b) {
          return (a.datum || a.date || "").localeCompare(b.datum || b.date || "");
        });
        var vastePosten = kd.vastePosten || [];
        var totaal = 0;
        vastePosten.forEach(function(p) { totaal += Number(p.prijs || 0); });
        activiteiten.forEach(function(a) { totaal += Number(a.prijs || a.price || 0); });
        var totaalStr = Number(totaal).toFixed(2).replace(".", ",");
        var lim = mfLimietVoorKlas(klas);
        var resterend = lim - totaal;
        var over = totaal > lim;

        var y = 30;

        // Logo (verhouding bewaren: max breedte 35mm, max hoogte 16mm)
        if (logoBase64) {
          try {
            var imgProps = doc.getImageProperties(logoBase64);
            var logoMaxW = 35, logoMaxH = 16;
            var ratio = Math.min(logoMaxW / imgProps.width, logoMaxH / imgProps.height);
            var logoW = imgProps.width * ratio, logoH = imgProps.height * ratio;
            doc.addImage(logoBase64, "PNG", marginL, y - logoH, logoW, logoH, "", "FAST");
          } catch(e) {}
        }

        // Klas badge (blauw blok rechts)
        doc.setFillColor(BLAUW[0], BLAUW[1], BLAUW[2]);
        doc.roundedRect(pageW - marginR - 42, y - 14, 42, 14, 2, 2, "F");
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(13);
        doc.setFont("helvetica", "bold");
        doc.text("Klas: " + klas, pageW - marginR - 21, y - 6, { align: "center" });

        // Blauwe lijn
        y += 7;
        doc.setDrawColor(BLAUW[0], BLAUW[1], BLAUW[2]);
        doc.setLineWidth(0.8);
        doc.line(marginL, y, pageW - marginR, y);
        y += 7;

        // Periode
        doc.setTextColor(0, 0, 0);
        doc.setFontSize(11);
        doc.setFont("helvetica", "bold");
        doc.text("Overzicht activiteiten van " + periodeLabel, marginL, y);
        y += 6;

        // Limiet tekst
        doc.setFontSize(9);
        doc.setFont("helvetica", "normal");
        doc.setTextColor(100, 100, 100);
        doc.text("De maximumfactuur bedraagt \u20ac" + limiet.kleuter + " voor kleuters en \u20ac" + limiet.lager + " voor de lagere school.", marginL, y);
        y += 8;

        // Tabel header
        var col1 = contentW * 0.55, col2 = contentW * 0.22, col3 = contentW * 0.23;
        doc.setFillColor(BLAUW[0], BLAUW[1], BLAUW[2]);
        doc.rect(marginL, y, contentW, 8, "F");
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(9);
        doc.setFont("helvetica", "bold");
        doc.text("GEGEVENS", marginL + 2, y + 5.5);
        doc.text("KOSTPRIJS", marginL + col1 + 2, y + 5.5);
        doc.text("DATUM", marginL + col1 + col2 + 2, y + 5.5);
        y += 8;

        // Tabel rijen
        doc.setFont("helvetica", "normal");
        doc.setTextColor(30, 30, 30);
        var rijH = 7;
        var rijIdx = 0;

        function tekenRij(omschrijving, prijs, datum, isVaste) {
          var bg = isVaste ? GEEL : (rijIdx % 2 === 0 ? [255,255,255] : GRIJS);
          doc.setFillColor(bg[0], bg[1], bg[2]);
          doc.rect(marginL, y, contentW, rijH, "F");
          doc.setDrawColor(220, 220, 220);
          doc.setLineWidth(0.2);
          doc.line(marginL, y + rijH, marginL + contentW, y + rijH);
          doc.setFontSize(9);
          if (isVaste) {
            doc.setFont("helvetica", "italic");
          } else {
            doc.setFont("helvetica", "normal");
          }
          doc.setTextColor(30, 30, 30);
          // Omschrijving - afkappen als te lang
          var maxOmschr = Math.floor(col1 / 2.2);

    function messageIsLate(m){ return m.due && m.due < new Date().toISOString().slice(0,10) && !m.done && !m.archived; }
    function messageKey(m){ return m.groupId || m.id; }

    function renderMessages(){
      const activeMessages = (data.messages||[]).filter(m=>!m.archived);
      const herstel = datumHerstelNotice();
      $("messages").innerHTML = herstel + activeMessages.map(m=>`
        <div class="notice ${messageIsLate(m)?"message-card late":""}"><div class="bar">
          <div>
            <strong>${esc(m.text)}</strong>
            <span class="muted">tegen ${esc(m.due || "")}</span>
            ${messageIsLate(m)?`<span class="tag pink">te laat</span>`:""}

          </div>
          ${isSecretary()?`<span class="right muted">${m.done?"In orde":"Nog niet in orde"}</span>`:
          `<label class="right"><input type="checkbox" ${m.done?"checked":""} onchange="doneMsg('${m.id}',this.checked)"> in orde</label>`}
        </div></div>`).join("");
    }
    window.doneMsg = (id,checked) => {
      const m=data.messages.find(x=>x.id===id);
      if(m){ m.done=checked; m.doneAt=checked ? new Date().toISOString() : ""; }
      markDirty();
      renderMessages();
    };
    async function updateMessageInClasses(message, action){
      const key = messageKey(message);
      const fallbackText = message.text || "";
      const fallbackDue = message.due || "";
      for(const klas of allClasses){
        const ref = classRef(klas);
        const snap = await getDoc(ref);
        if(!snap.exists()) continue;
        const item = snap.data();
        item.messages ||= [];
        let changed = false;
        item.messages = item.messages.filter(m => {
          const same = messageKey(m) === key || (!message.groupId && m.text === fallbackText && m.due === fallbackDue);
          if(!same) return true;
          changed = true;
          if(action === "delete") return false;
          if(action === "archive") m.archived = true;
          if(action === "restore") m.archived = false;
          return true;
        });
        if(changed) await setDoc(ref,item);
      }
    }
    window.archiveMsg = async id => {
      const m=(data.messages||[]).find(x=>x.id===id);
      if(!m || !isSecretary()) return;
      await updateMessageInClasses(m, "archive");

    window.deleteMsg = async id => {

    function parseName(line){ line=line.trim(); if(!line)return null; if(line.includes(",")){ const [last,first]=line.split(","); return {last:last.trim(),first:first.trim()}; } const parts=line.split(/\s+/); return {first:parts.shift(),last:parts.join(" ")}; }
    window.importNames = () => { $("pasteNames").value.split(/\r?\n/).map(parseName).filter(Boolean).forEach(n=>addStudentObj(n.last,n.first,false,startDate())); markDirty(); render(); };
    window.addStudent = () => { addStudentObj($("newLast").value,$("newFirst").value,$("newColleague").checked,$("newStart").value||startDate()); markDirty(); render(); };
    function addStudentObj(last,first,colleague,start){ if(!last||!first)return; if(data.leerlingen.some(s=>(s.last||"").toLowerCase()===last.toLowerCase()&&(s.first||"").toLowerCase()===first.toLowerCase()))return; data.leerlingen.push({id:uid(),last,first,colleague,start,end:endDate()}); }
    function normaliseerKolomNaam(value){
      return String(value||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]+/g,"");
    }
    function waardeUitExcelRij(row, kolommen){
      const gezocht=new Set(kolommen.map(normaliseerKolomNaam));
      for(const [key,value] of Object.entries(row||{})){
        if(gezocht.has(normaliseerKolomNaam(key))) return String(value||"").trim();
      }
      return "";
    }
    function excelRijNaarNaam(row){
      const klas=waardeUitExcelRij(row,["klas","klasgroep","groep","class"]);
      if(klas && klas.toUpperCase()!==activeClass.toUpperCase()) return null;
      const first=waardeUitExcelRij(row,["voornaam","roepnaam","first","firstname"]);
      const last=waardeUitExcelRij(row,["achternaam","familienaam","naamfamilie","last","lastname"]);
      if(first || last) return {first,last};
      const full=waardeUitExcelRij(row,["naam","leerling","leerlingnaam","volledigenaam","naam leerling"]);
      const parsed=parseName(full);
      return parsed ? {first:parsed.first,last:parsed.last} : null;
    }
    async function leesExcelRijen(file){
      if(typeof XLSX==="undefined") throw new Error("De Excel-lezer is niet geladen. Controleer de internetverbinding en herlaad de pagina.");
      const buffer=await file.arrayBuffer();
      const workbook=XLSX.read(buffer,{type:"array"});
      const sheetName=workbook.SheetNames[0];
      if(!sheetName) return [];
      return XLSX.utils.sheet_to_json(workbook.Sheets[sheetName],{defval:""});
    }
    window.importExcelKlaslijst = async function(){
      if(!isSecretary()) return alert("Alleen secretariaat kan Excelbestanden importeren.");
      if(!data) return;
      const file=$("excelKlasFile")?.files?.[0];
      if(!file) return alert("Kies eerst een Excel- of CSV-bestand.");
      const result=$("excelImportResult");
      if(result) result.textContent="Bestand lezen...";
      try{
        const rows=await leesExcelRijen(file);
        let added=0,skipped=0;
        rows.forEach(row=>{
          const item=excelRijNaarNaam(row);
          if(!item || (!item.first && !item.last)){ skipped++; return; }
          const before=data.leerlingen.length;
          addStudentObj(item.last,item.first,false,startDate());
          if(data.leerlingen.length>before) added++; else skipped++;
        });
        data.leerlingen.sort((a,b)=>name(a).localeCompare(name(b),"nl"));
        await saveNow();
        render();
        alert(`${added} leerling(en) toegevoegd uit ${file.name}. ${skipped} rij(en) overgeslagen omdat ze leeg waren, bij een andere klas hoorden of al bestonden.`);
      }catch(err){
        console.error(err);
        if(result) result.textContent="Import mislukt.";
        alert(`Excel importeren lukte niet.\n\n${err.message||err}`);

    };
    function classNameKey(first,last){
      return `${String(first||"").trim().toLowerCase()} ${String(last||"").trim().toLowerCase()}`.replace(/\s+/g," ").trim();
    }
    function schoolbeheerRijUitDashboardNaam(naam){
      const parsed=parseName(String(naam||""));
      if(!parsed) return null;
      return {first:parsed.first||"",last:parsed.last||""};
    }
    async function dashboardLeerlingenVoorKlasUitLeerkrachten(){
      const klasDocId=`${schooljaar}_${activeClass}`;
      const rechtstreeks=await getDoc(doc(db,"klasleerkrachten",klasDocId));
      const koppelingen=[];
      if(rechtstreeks.exists()) koppelingen.push(rechtstreeks.data());
      if(!koppelingen.length){
        const snap=await getDocs(query(collection(db,"klasleerkrachten"),where("klas","==",activeClass)));
        snap.forEach(d=>{
          const item=d.data();
          if(String(item.schooljaar||schooljaar)===schooljaar) koppelingen.push(item);
        });
      }
      const uids=[...new Set(koppelingen.flatMap(k=>Array.isArray(k.leerkracht_uids)?k.leerkracht_uids:[]).filter(Boolean))];
      const namen=[];
      const bronnen=[];
      for(const uidValue of uids){
        const snap=await getDoc(doc(db,"leerkrachten",uidValue));
        if(!snap.exists()) continue;
        bronnen.push(uidValue);
        (snap.data().leerlingen||[]).forEach(l=>{
          const naam=String(l.naam||"").trim();
          if(naam) namen.push({naam,uid:uidValue});
        });
      }
      try{
        const klasQuery=await getDocs(query(collection(db,"leerkrachten"),where("klas","==",activeClass)));
        klasQuery.forEach(d=>{
          if(bronnen.includes(d.id)) return;
          const item=d.data();
          if(item.schooljaar && String(item.schooljaar)!==schooljaar) return;
          bronnen.push(d.id);
          (item.leerlingen||[]).forEach(l=>{
            const naam=String(l.naam||"").trim();
            if(naam) namen.push({naam,uid:d.id});
          });
        });
      }catch(e){
        console.warn("Dashboard zoeken op klasveld lukte niet", e);
      }
      return {namen,koppelingen,uids,bronnen};
    }
    function voegDashboardNamenToeAanKlasData(targetData,dashboardNamen){
      const bestaande=new Set((targetData.leerlingen||[]).map(s=>classNameKey(s.first||s.firstName,s.last||s.lastName)));
      let added=0, skipped=0;
      dashboardNamen.forEach(item=>{
        const row=schoolbeheerRijUitDashboardNaam(item.naam);
        if(!row||(!row.first&&!row.last)){ skipped++; return; }
        const key=classNameKey(row.first,row.last);
        if(!key||bestaande.has(key)){ skipped++; return; }
        bestaande.add(key);
        targetData.leerlingen.push({id:uid(),first:row.first,last:row.last,colleague:false,start:startDate(),end:endDate(),bron:"dashboard"});
        added++;
      });
      targetData.leerlingen.sort((a,b)=>name(a).localeCompare(name(b),"nl"));
      return {added,skipped};
    }
    window.startKlasUitDashboard = async function(klas){
      if(!isSecretary()) return alert("Alleen secretariaat kan een nieuwe klaslijst starten.");
      if(!confirm(`${klas} starten in ${schooljaar} met namen uit dashboard?\n\nEr wordt niets overschreven of gewist.`)) return;
      try{
        activeClass=klas;
        const ref=doc(db,"schoolbeheer",schooljaar,"klassen",klas);
        const bestaand=await getDoc(ref);
        if(bestaand.exists()) return alert(`${klas} bestaat intussen al in ${schooljaar}. Herlaad de klas.`);
        const dashboardInfo=await dashboardLeerlingenVoorKlasUitLeerkrachten();
        const dashboardNamen=dashboardInfo.namen||[];
        if(!dashboardNamen.length){
          const reden = !dashboardInfo.koppelingen?.length
            ? "Geen klasleerkracht-koppeling gevonden voor deze klas."
            : !dashboardInfo.uids?.length
              ? "De klasleerkracht-koppeling heeft geen gebruikers-ID. Koppel de leerkracht opnieuw bij 'Klasleerkrachten voorbereiden'."
              : "Er zijn wel leerkrachten gekoppeld, maar hun dashboard bevat nog geen namen of is nog niet opnieuw geopend sinds de laatste update.";
          alert(`Geen dashboardnamen gevonden voor ${klas}.\n\n${reden}`);
          return;
        }
        const nieuw=emptyClassDoc(klas);
        const result=voegDashboardNamenToeAanKlasData(nieuw,dashboardNamen);
        nieuw.bijgewerktOp=new Date().toISOString();

      $("newYearResult").innerHTML = `<section class="notice"><h3>Controle-overzicht</h3><p><strong>${esc(bron)}</strong> → <strong>${esc(doel)}</strong></p><div class="two"><div><h3>Naar ${esc(doel)}</h3>${doorgaan.length?`<ul>${doorgaan.map(n=>`<li>${esc(n)}</li>`).join("")}</ul>`:`<p class="muted">Geen leerlingen.</p>`}</div><div><h3>Blijft in ${esc(bron)}</h3>${blijven.length?`<ul>${blijven.map(n=>`<li>${esc(n)}</li>`).join("")}</ul>`:`<p class="muted">Geen zittenblijvers.</p>`}</div></div><p class="muted">Controleer dit goed.</p><button class="danger" onclick="doorschuivingBewarenNieuwSchooljaar()">Doorschuiving bewaren</button></section>`;
      $("newYearResult").scrollIntoView({behavior:"smooth", block:"start"});
    };
    function volgendSchooljaarVan(huidig){ const start=Number(String(huidig||schooljaar).slice(0,4))+1; return `${start}-${start+1}`; }
    function studentVoorNieuwSchooljaar(s,doelSchooljaar){ return {id:uid(),first:s.first||s.firstName||"",last:s.last||s.lastName||"",colleague:!!s.colleague,start:`${doelSchooljaar.slice(0,4)}-09-01`,end:`${doelSchooljaar.slice(5,9)}-06-30`}; }
    async function voegLeerlingenToeAanNieuwSchooljaar(doelSchooljaar,klas,leerlingen){
      if(!klas||klas==="uit school"||!leerlingen.length) return;
      const ref=doc(db,"schoolbeheer",doelSchooljaar,"klassen",klas);
      const snap=await getDoc(ref);
      const item=snap.exists()?snap.data():emptyClassDoc(klas);
      item.schooljaar=doelSchooljaar; item.klas=klas;
      item.leerlingen||=[]; item.refter||={}; item.activiteiten||=[]; item.aankopen||=[]; item.vrijeDagen||=[...standardFree]; item.messages||=[]; item.processed||={refter:""};
      item.bewaarTot=bewaarTotVoorSchooljaar(doelSchooljaar); item.bewaartermijnJaren=BEWAAR_JAREN_SCHOOLBEHEER;
      leerlingen.forEach(s=>{ const nieuw=studentVoorNieuwSchooljaar(s,doelSchooljaar); if(!item.leerlingen.some(b=>name(b).toLowerCase()===name(nieuw).toLowerCase())) item.leerlingen.push(nieuw); });
      item.leerlingen.sort((a,b)=>name(a).localeCompare(name(b),"nl"));
      item.bijgewerktOp=new Date().toISOString();
      await setDoc(ref,item);
    }
    window.doorschuivingBewarenNieuwSchooljaar = async function(){
      if(!isSecretary()) return alert("Alleen secretariaat kan doorschuiving bewaren.");
      const bron=$("newYearBronKlas").value, doel=$("newYearDoelKlas").value;
      if(!bron||!doel) return alert("Kies eerst bron- en doelklas.");
      const bevestig=prompt(`Dit maakt/werkt klaslijsten bij in ${volgendSchooljaarVan(schooljaar)}.\n\nTyp DOORSCHUIVEN om te bevestigen.`);
      if(bevestig!=="DOORSCHUIVEN") return;
      const bronLeerlingen=await laadLeerlingenVoorKlas(bron);
      if(!bronLeerlingen||!bronLeerlingen.length) return alert("Geen leerlingen gevonden.");
      const zittenblijverIds=new Set([...document.querySelectorAll(".blijverCheck:checked")].map(ch=>ch.dataset.id));
      const blijven=bronLeerlingen.filter(s=>zittenblijverIds.has(s.id));
      const doorgaan=bronLeerlingen.filter(s=>!zittenblijverIds.has(s.id));
      const nieuwJaar=volgendSchooljaarVan(schooljaar);
      await voegLeerlingenToeAanNieuwSchooljaar(nieuwJaar,bron,blijven);
      await voegLeerlingenToeAanNieuwSchooljaar(nieuwJaar,doel,doorgaan);
      alert(`Doorschuiving bewaard in ${nieuwJaar}.\n${doorgaan.length} naar ${doel}, ${blijven.length} zittenblijver(s) in ${bron}.`);
    };


    function volgendSchooljaarVoorLeerkrachten(){
      const start = Number(String(schooljaar).slice(0,4)) + 1;
      return `${start}-${start + 1}`;
    }
    function lijstNaarTekst(value){
      return Array.isArray(value) ? value.join(", ") : (value || "");
    }
    function tekstNaarLijst(value){
      return String(value || "").split(",").map(x => x.trim()).filter(Boolean);
    }
    function normaliseerKlasId(klas){
      return String(klas || "").trim().toUpperCase();
    }
    async function leerkrachtKoppelingVoor(jaar, klas){
      const ref = doc(db, "klasleerkrachten", `${jaar}_${klas}`);
      const snap = await getDoc(ref);
      return snap.exists() ? snap.data() : null;
    }
    async function leerlingAantalVoorKlas(jaar, klas){
      const snap = await getDoc(doc(db, "schoolbeheer", jaar, "klassen", klas));
      return snap.exists() && Array.isArray(snap.data().leerlingen) ? snap.data().leerlingen.length : 0;
    }
    async function renderLeerkrachtenHuidigSchooljaar(){
      if(!isSecretary()) return;
      $("adminBody").innerHTML = `<section class="notice"><h3>Klasleerkrachten koppelen</h3><p class="muted">Even laden...</p></section>`;
      await loadClassesFromFirebase();
      const rijen = [];
      for(const klas of allClasses){
        const [koppeling, aantal] = await Promise.all([
          leerkrachtKoppelingVoor(schooljaar, klas),
          leerlingAantalVoorKlas(schooljaar, klas)
        ]);
        rijen.push({klas,koppeling,aantal});
      }
      $("adminBody").innerHTML = `<section class="notice">
        <h3>Klasleerkrachten koppelen - ${esc(schooljaar)}</h3>
        <p class="muted">Vul per klas de naam en het e-mailadres van de klasleerkracht in. Het e-mailadres is het belangrijkste: de leerkracht krijgt die klas zodra hij/zij met datzelfde e-mailadres inlogt. Een gebruikers-ID is niet nodig.</p>
      </section>
      <section class="panel" style="box-shadow:none">
        <div class="bar" style="margin-bottom:12px">
          <div>
            <h3>Huidige klas-leerkrachtkoppelingen</h3>
            <p class="muted">Gebruik komma's voor duo-banen, bijvoorbeeld: juf Sara, juf Noor.</p>
          </div>
          <button class="green right" onclick="bewaarAlleLeerkrachtKoppelingen()">Alles bewaren</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Klas</th><th>Leerlingen</th><th>Naam/namen leerkracht</th><th>E-mailadres(sen)</th><th></th></tr></thead>
            <tbody>${rijen.map(({klas,koppeling,aantal})=>`
              <tr>
                <td><strong>${esc(klas)}</strong></td>
                <td>${aantal ? `${aantal} leerling(en)` : `<span class="muted">geen klaslijst</span>`}</td>
                <td><input data-koppel-klas="${esc(klas)}" data-koppel-field="namen" value="${esc(lijstNaarTekst(koppeling?.leerkracht_namen))}" placeholder="juf Isabel"></td>
                <td><input data-koppel-klas="${esc(klas)}" data-koppel-field="emails" value="${esc(lijstNaarTekst(koppeling?.leerkracht_emails))}" placeholder="naam@bsdelinde.net"></td>
                <td><button class="small green" onclick="bewaarLeerkrachtKoppeling('${esc(klas)}')">Bewaar</button></td>
              </tr>`).join("")}</tbody>
          </table>
        </div>
        <div class="notice" style="margin-top:12px">
          <strong>Voor secretariaat:</strong>
          <p class="muted">Als er nog geen leerkracht gekoppeld is, kunnen overgangsbespreking en oudercontacten nu toch als klasdossier openen. Koppelen blijft wel nodig zodat de klasleerkracht later automatisch haar/zijn eigen klas ziet.</p>
        </div>
      </section>`;
    }
    window.bewaarLeerkrachtKoppeling = async function(klas){
      if(!isSecretary()) return alert("Alleen secretariaat kan klasleerkrachten koppelen.");
      const cleanKlas = normaliseerKlasId(klas);
      const namen = tekstNaarLijst(document.querySelector(`input[data-koppel-klas="${CSS.escape(cleanKlas)}"][data-koppel-field="namen"]`)?.value);
      const emails = tekstNaarLijst(document.querySelector(`input[data-koppel-klas="${CSS.escape(cleanKlas)}"][data-koppel-field="emails"]`)?.value).map(x=>x.toLowerCase());
      if(!emails.length) return alert(`Vul minstens één e-mailadres in voor ${cleanKlas}.`);
      if(emails.some(e=>!e.includes("@"))) return alert("Controleer de e-mailadressen. Er ontbreekt ergens een @.");
      const bestaand = await leerkrachtKoppelingVoor(schooljaar, cleanKlas);
      await setDoc(doc(db, "klasleerkrachten", `${schooljaar}_${cleanKlas}`), {
        actief: true,
        schooljaar,
        klas: cleanKlas,
        klasId: cleanKlas,
        klasNaam: cleanKlas,
        leerjaar: cleanKlas,
        hoofdleerkracht_email: emails[0] || "",
        leerkracht_emails: emails,
        leerkracht_namen: namen,
        leerkracht_uids: Array.isArray(bestaand?.leerkracht_uids) ? bestaand.leerkracht_uids : [],
        bijgewerktOp: new Date().toISOString(),
        bijgewerktDoor: user.email || user.uid
      }, { merge: true });
      setStatus(`${cleanKlas} gekoppeld`, true);
    };
    window.bewaarAlleLeerkrachtKoppelingen = async function(){
      if(!isSecretary()) return alert("Alleen secretariaat kan klasleerkrachten koppelen.");
      let aantal = 0;
      for(const klas of allClasses){
        const emails = tekstNaarLijst(document.querySelector(`input[data-koppel-klas="${CSS.escape(klas)}"][data-koppel-field="emails"]`)?.value);
        if(!emails.length) continue;
        await window.bewaarLeerkrachtKoppeling(klas);
        aantal++;
      }
      alert(`${aantal} klas-leerkrachtkoppeling(en) bewaard voor ${schooljaar}.`);
      renderLeerkrachtenHuidigSchooljaar();
    };
    async function renderLeerkrachtenVolgendJaar(){
      const box = $("leerkrachtenVolgendJaar");
      if(!box || !isSecretary()) return;
      const nieuwJaar = volgendSchooljaarVoorLeerkrachten();
      box.innerHTML = `<section class="notice"><h3>Leerkrachten volgend schooljaar</h3><p class="muted">Even laden...</p></section>`;
      const rijen = [];
      for(const klas of allClasses){
        const huidig = await leerkrachtKoppelingVoor(schooljaar, klas);
        rijen.push({ klas, huidig });
      }
      box.innerHTML = `<section class="panel" style="box-shadow:none;margin-top:16px">
        <h3>Leerkrachten volgend schooljaar</h3>
        <p class="muted">Standaard blijft elke leerkracht in dezelfde klas. Pas alleen de klas aan waar volgend schooljaar iemand anders staat.</p>
        <section class="notice no-print">
          <h3>Nieuwe klas met leerkracht toevoegen</h3>
          <p class="muted">Gebruik dit bijvoorbeeld als er ooit een 2B komt. Het e-mailadres is genoeg; de leerkracht registreert of logt later in met datzelfde e-mailadres.</p>
          <div class="row">
            <label>Klas<input id="nieuweLeerkrachtKlas" placeholder="bv. 2B" style="text-transform:uppercase"></label>
            <label>Naam leerkracht<input id="nieuweLeerkrachtNaam" placeholder="juf Sara"></label>
            <label>E-mailadres<input id="nieuweLeerkrachtEmail" placeholder="naam@bsdelinde.net"></label>
            <button class="green" onclick="voegNieuweKlasMetLeerkrachtToe()">Klas en leerkracht toevoegen</button>
          </div>
        </section>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Klas</th><th>Nu</th><th>Volgend schooljaar ${esc(nieuwJaar)}</th></tr></thead>
            <tbody>${rijen.map(({klas,huidig}) => `
              <tr>
                <td><strong>${esc(klas)}</strong></td>
                <td>${huidig ? `${esc(lijstNaarTekst(huidig.leerkracht_namen))}<br><span class="muted">${esc(lijstNaarTekst(huidig.leerkracht_emails))}</span>` : `<span class="muted">Geen koppeling gevonden</span>`}</td>
                <td>
                  <label>Namen<input data-klas="${esc(klas)}" data-field="namen" value="${esc(lijstNaarTekst(huidig?.leerkracht_namen))}" placeholder="juf Isabel"></label>
                  <label>E-mails<input data-klas="${esc(klas)}" data-field="emails" value="${esc(lijstNaarTekst(huidig?.leerkracht_emails))}" placeholder="naam@bsdelinde.net"></label>
                </td>
              </tr>`).join("")}</tbody>
          </table>
        </div>
        <div class="action-row no-print">
          <button class="primary" onclick="bevestigZelfdeLeerkrachten()">Alle leerkrachten blijven in dezelfde klas</button>
          <button class="green" onclick="bewaarLeerkrachtenVolgendSchooljaar()">Leerkrachten bewaren voor nieuw schooljaar</button>
        </div>
      </section>`;
    }
    window.voegNieuweKlasMetLeerkrachtToe = async function(){
      if(!isSecretary()) return alert("Alleen secretariaat kan een nieuwe klas koppelen.");
      const nieuwJaar = volgendSchooljaarVoorLeerkrachten();
      const klas = ($("nieuweLeerkrachtKlas")?.value || "").trim().toUpperCase();
      const naam = ($("nieuweLeerkrachtNaam")?.value || "").trim();
      const email = ($("nieuweLeerkrachtEmail")?.value || "").trim().toLowerCase();
      if(!klas) return alert("Vul eerst de klas in, bijvoorbeeld 2B.");
      if(!email || !email.includes("@")) return alert("Vul een geldig e-mailadres in.");
      const bevestig = confirm(`Nieuwe klas ${klas} maken voor ${nieuwJaar} en koppelen aan ${email}?`);
      if(!bevestig) return;

      await setDoc(doc(db, "klasleerkrachten", `${nieuwJaar}_${klas}`), {
        actief: true,
        schooljaar: nieuwJaar,
        klas,
        leerjaar: klas,
        hoofdleerkracht_email: email,
        leerkracht_emails: [email],
        leerkracht_namen: naam ? [naam] : [],
        leerkracht_uids: []
      });

      const klasRef = doc(db, "schoolbeheer", nieuwJaar, "klassen", klas);
      const klasSnap = await getDoc(klasRef);
      if(!klasSnap.exists()){
        const vorigSchooljaar = schooljaar;
        schooljaar = nieuwJaar;
        const nieuwDoc = emptyClassDoc(klas);
        schooljaar = vorigSchooljaar;
        await setDoc(klasRef, nieuwDoc);
      }

      if(!allClasses.includes(klas)){
        allClasses = [...allClasses, klas].sort((a,b)=>a.localeCompare(b,"nl",{numeric:true}));
      }
      alert(`${klas} is klaargezet voor ${nieuwJaar} met ${email}.`);
      await renderLeerkrachtenVolgendJaarOnly();
    };
    window.bevestigZelfdeLeerkrachten = function(){
      alert("Alles staat al ingevuld zoals dit schooljaar. Klik nu op 'Leerkrachten bewaren voor nieuw schooljaar' om dit echt in Firebase te bewaren.");
    };
    window.bewaarLeerkrachtenVolgendSchooljaar = async function(){
      if(!isSecretary()) return alert("Alleen secretariaat kan dit bewaren.");
      const nieuwJaar = volgendSchooljaarVoorLeerkrachten();
      const bevestig = prompt(`Dit maakt de klas-leerkrachtkoppelingen voor ${nieuwJaar}.\n\nTyp LEERKRACHTEN om te bevestigen.`);
      if(bevestig !== "LEERKRACHTEN") return;
      let aantal = 0;
      for(const klas of allClasses){
        const namen = tekstNaarLijst(document.querySelector(`input[data-klas="${CSS.escape(klas)}"][data-field="namen"]`)?.value);
        const emails = tekstNaarLijst(document.querySelector(`input[data-klas="${CSS.escape(klas)}"][data-field="emails"]`)?.value).map(x => x.toLowerCase());
        const huidigeKoppeling = await leerkrachtKoppelingVoor(schooljaar, klas);
        const uids = Array.isArray(huidigeKoppeling?.leerkracht_uids) ? huidigeKoppeling.leerkracht_uids : [];
        if(!emails.length) continue;
        await setDoc(doc(db, "klasleerkrachten", `${nieuwJaar}_${klas}`), {
          actief: true,
          schooljaar: nieuwJaar,
          klas,
          leerjaar: klas,
          hoofdleerkracht_email: emails[0] || "",
          leerkracht_emails: emails,
          leerkracht_namen: namen,
          leerkracht_uids: uids
        });
        aantal++;
      }
      alert(`${aantal} klas-leerkrachtkoppeling(en) bewaard voor ${nieuwJaar}.`);
    };
    async function renderLeerkrachtenVolgendJaarOnly(){
      $("adminBody").innerHTML = `<button class="white no-print" onclick="terugNaarNieuwSchooljaarHome()">Terug naar keuzes</button><div id="leerkrachtenVolgendJaar" style="margin-top:14px"></div>`;
      await renderLeerkrachtenVolgendJaar();
    }
    window.renderLeerkrachtenVolgendJaarOnly = renderLeerkrachtenVolgendJaarOnly;
    function renderWorkbooks(){ $("content").innerHTML = `<div class="panel"><div class="bar"><div><h2>Werkboeken</h2><p class="muted">Later uit te werken.</p></div>${screenTools("werkboeken")}</div>${helpPanel("werkboeken")}</div>`; }

    // Sidebar navigatie
    document.querySelectorAll(".sb-item").forEach(el => {
      el.addEventListener("click", () => {
        tab = el.dataset.tab;
        render();
      });
    });

    $("schooljaarInput").addEventListener("change", async () => {
      schooljaar = $("schooljaarInput").value.trim() || schooljaar;
      await loadAllowedClasses();
      activeClass = allowedClasses[0] || "";
      renderScope();
      if(activeClass) await openClass(activeClass);
    });

    $("logoutBtn").addEventListener("click", () => signOut(auth).then(() => location.href="index.html"));

    onAuthStateChanged(auth, async authUser => {
      if(!authUser){ location.href="index.html"; return; }
      user = authUser;
      try{
        await loadRole();
        await loadAllowedClasses();
        if(!isSecretary() && !allowedClasses.length){
          $("content").innerHTML = `<div class="panel"><h2>Geen klas gevonden</h2><p class="muted">Je account is nog niet gekoppeld in klasleerkrachten.</p></div>`;
          setStatus("Geen klas");
          return;
        }
        activeClass = allowedClasses[0] || DEFAULT_CLASSES[0];
        renderScope();
        await openClass(activeClass);
      }catch(err){
        console.error(err);
        $("content").innerHTML = `<div class="panel"><h2>Laden mislukt</h2><p class="muted">${esc(err.message)}</p></div>`;
        setStatus("Fout");
      }
    });
  </script>

  <!-- Dubbele scrollbar: spiegel bovenaan elke table-wrap -->
  <script>
  function installScrollMirrors(){
    document.querySelectorAll('.table-wrap').forEach(wrap => {
      // Niet twee keer installeren
      if(wrap.previousElementSibling?.classList?.contains('scroll-mirror-top')) return;

      const mirror = document.createElement('div');
      mirror.className = 'scroll-mirror-top';
      const inner = document.createElement('div');
      mirror.appendChild(inner);
      wrap.parentNode.insertBefore(mirror, wrap);

      function syncWidth(){
        inner.style.width = wrap.scrollWidth + 'px';
      }
      syncWidth();

      let syncing = false;
      mirror.addEventListener('scroll', () => {
        if(syncing) return; syncing = true;
        wrap.scrollLeft = mirror.scrollLeft;
        syncing = false;
      });
      wrap.addEventListener('scroll', () => {
        if(syncing) return; syncing = true;
        mirror.scrollLeft = wrap.scrollLeft;
        syncWidth();
        syncing = false;
      });

      // Herinstalleer als de tabel herrenderd wordt (breedte kan wijzigen)
      new ResizeObserver(syncWidth).observe(wrap);
    });
  }

  // Na elke render opnieuw installeren
  const _origRender = window.__mirrorRenderHook;
  const observer = new MutationObserver(() => installScrollMirrors());
  document.addEventListener('DOMContentLoaded', () => {
    observer.observe(document.getElementById('content'), { childList: true, subtree: false });
    installScrollMirrors();
  });
  </script>
