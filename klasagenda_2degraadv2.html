<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Klasagenda L3–L4 – A4 liggend (Arial)</title>
<style>
  :root{
    --page-w: 297mm; --page-h: 210mm;
    --m-top: 8mm; --m-side: 8mm;
    --gap: 3.2mm;
    --ink:#111; --line:#111; --muted:#6b7280;
  }
  html,body{height:100%}
  body{margin:0;background:#f3f5f7;color:var(--ink);font-family:Arial,Helvetica,sans-serif;font-size:12pt;line-height:1.28}
  *{box-sizing:border-box}

  /* Klas-tabs */
  .klas-tabs{display:flex;gap:0;background:#e5e7eb;padding:0;border-bottom:2px solid #d0d7de;position:sticky;top:0;z-index:51}
  .klas-tab{padding:.5rem 1.6rem;font-weight:700;font-size:1rem;cursor:pointer;border:none;background:transparent;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:inherit;color:#6b7280}
  .klas-tab.active{background:#fff;color:#0a66c2;border-bottom:3px solid #0a66c2}
  .klas-tab:hover:not(.active){background:#f0f4f8;color:#111}

  /* Zwevende mini-toolbar */
  .mini-toolbar{
    position:fixed;
    z-index:200;
    background:#1e293b;
    border-radius:10px;
    padding:5px 8px;
    display:none;
    align-items:center;
    gap:3px;
    box-shadow:0 4px 20px rgba(0,0,0,.28);
    pointer-events:auto;
    user-select:none;
  }
  .mini-toolbar.visible{ display:flex; }
  .mt-btn{
    appearance:none;border:none;background:transparent;color:#e2e8f0;
    padding:4px 7px;border-radius:6px;cursor:pointer;font-size:13px;
    font-family:Arial,sans-serif;font-weight:700;line-height:1.2;
    transition:background .12s;white-space:nowrap;
  }
  .mt-btn:hover{ background:rgba(255,255,255,.15); }
  .mt-btn.active-fmt{ background:rgba(99,179,237,.35);color:#fff; }
  .mt-sep{ width:1px;height:20px;background:rgba(255,255,255,.18);margin:0 2px; }
  .mt-picto-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:3px;
    padding:6px;background:#1e293b;border-radius:8px;
    position:absolute;top:calc(100% + 6px);left:0;
    box-shadow:0 4px 20px rgba(0,0,0,.28);
    display:none;
  }
  .mt-picto-grid.open{ display:grid; }
  .mt-picto-item{
    width:38px;height:38px;border-radius:6px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.08);
  }
  .mt-picto-item:hover{ background:rgba(255,255,255,.22); }
  .mt-picto-item img{ width:28px;height:28px;object-fit:contain; }

  /* Toolbar (niet in print) */
  .toolbar{position:sticky;top:42px;z-index:50;display:flex;flex-wrap:wrap;gap:.6rem 1rem;align-items:center;padding:.6rem .8rem;background:#fff;border-bottom:1px solid #e5e7eb}
  .toolbar .group{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
  .toolbar select{font:inherit;padding:.3rem .45rem}
  .toolbar button{appearance:none;border:1px solid #d0d7de;background:#fff;padding:.45rem .7rem;border-radius:.5rem;cursor:pointer;font-weight:700}
  .toolbar button.primary{background:#0a66c2;border-color:#0a66c2;color:#fff}
  .sep{width:1px;height:28px;background:#e5e7eb;margin:0 .25rem}

  /* Pagina */
  .page{width:var(--page-w);min-height:var(--page-h);margin:0 auto;background:#fff;padding:var(--m-top) var(--m-side) var(--m-side) var(--m-side)}
  header.page-head{display:grid;grid-template-columns:1fr auto;gap:var(--gap);align-items:center;margin-bottom:var(--gap)}
  .title{font-size:18pt;font-weight:800}
  .pill{display:inline-block;border:2px solid var(--line);padding:1px 9px;border-radius:10px;line-height:1}
  .right-head{display:flex;align-items:center;gap:6px}
  .monthBox{border:2px solid var(--line);border-radius:10px;padding:2px 8px;font-weight:700;background:#fff;min-width:52mm;text-transform:lowercase}
  .classIcon{
  width: 22mm;              /* iets breder (mag u nog verhogen) */
  height: 12mm;             /* HOUD deze hoogte: header blijft even hoog */
  display: flex;
  align-items: flex-end;    /* zet de zebra onderaan in het vak */
  justify-content: center;
  overflow: visible;        /* laat de afbeelding onder het vak uitsteken */
}
.classIcon img{
  max-width: none;
  max-height: none;
  height: 18mm;             /* GROOTTE van de zebra  → verhoog/verlaag naar wens */
  transform: translateY(1.2mm); /* duw hem nog iets lager richting vrijdagkader */
  object-fit: contain;
}
  /* Grids */
  .week-top{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--gap)}
  .bottom-row{display:grid;grid-template-columns:1.5fr 3.5fr;gap:var(--gap);margin-top:3mm;align-items:stretch}
  .weekendCol{display:grid;grid-template-rows:1fr 1fr;gap:var(--gap);overflow:hidden}
  .day.small{min-height:0;overflow:hidden}

  /* Dagkaarten */
  .day{position:relative;border:2.6px solid var(--line);border-radius:7px;background:#fff;display:flex;flex-direction:column;--bullet:14px;--plan-fs:12pt;--task-gap:6pt; z-index:1;}
 .day header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:2.6mm;
  border-bottom:2.6px solid var(--line);
  background:#f0f0f0;            /* lichtgrijs */
  border-top-left-radius:7px;
  border-top-right-radius:7px;
}
  .day header.stacked{flex-direction:column;justify-content:center;gap:1.2mm} /* ma–vr: datum onder dag */
  .dn{font-weight:800;letter-spacing:.02em;font-size:11.5pt}
  .hdrLeft{display:flex;align-items:center;gap:3mm}
  .hdrEnv{width:6.5mm;height:4.6mm}
  .hdrEnv svg{width:100%;height:100%}
  .hdrEnv *{fill:none;stroke:#111;stroke-width:1.2}
  .dateWrap{display:flex;align-items:center;gap:4px;position:relative}
  .dDate{font-variant-numeric:tabular-nums;white-space:nowrap;font-size:10pt;cursor:pointer}
  .datePicker{position:absolute;opacity:0;width:1px;height:1px;pointer-events:none}

  .body{display:flex;flex-direction:column;padding:2mm;gap:1mm;flex:1;overflow:visible;position: relative;}
  .cell h3{margin:0 0 .3mm;font-size:10.2pt}

  /* Planbox werkdagen */
  .planBox{
    border:2.6px solid var(--line);
    border-radius:4px;
    padding:1.6mm;
    display:flex;
    flex-direction:column;
    flex:0;
    min-height:0;
    font-size:var(--plan-fs);
    overflow:visible;
  }
  .tasklist{list-style:none;margin:0;padding:0;display:block}
  .tasklist li{display:flex;align-items:flex-start;gap:.32rem;margin-bottom:var(--task-gap)}
  .tasklist li:last-child{margin-bottom:0}
  .bullet{display:inline-block;width:var(--bullet);height:var(--bullet);border:2px solid #0a3a52;border-radius:50%}
  .tasktext[contenteditable]{flex:1;min-height:1.05em;outline:none}

  /* Verwijderknopje in elke li */
  .tasklist li{ position: relative; }
  .tasklist .liDel{
    position:absolute; right:-2px; top:-4px; border:1px solid #d0d7de; background:#fff;
    border-radius:10px; width:18px; height:18px; line-height:16px; text-align:center; cursor:pointer; font-weight:700; padding:0;
  }
  .tasklist .liDel:hover{ background:#f5f7fa }

  /* Vrije tekstvlak in plan – verberg als er bullets zijn */
  .planText[contenteditable]{outline:none;min-height:0;white-space:pre-wrap}
  .planBox.has-tasks .planText{display:none}
  .planBox.has-tasks{padding-bottom:1mm}

  /* Weekend: nieuw – bullets toelaten; verberg wkCE zodra er bullets zijn */
  .day.small .tasklist{ display:block; }               /* i.p.v. display:none */
  .planBox.has-tasks .wkCE{ display:none; }

  /* Weekend: textarea (legacy) / contenteditable (nieuw) */
  .day.small .tasklist{display:block}
  .wkTA{
    width:100%; border:none; outline:none; resize:none; background:transparent;
    font-family:Arial,Helvetica,sans-serif; font-size:11pt; line-height:1.28;
    height:calc(2 * 1.28em);
    overflow:hidden; padding:0; margin:0;
  }
  .wkTA.maxed{ height:calc(3 * 1.28em); }

  /* Ik denk aan */
  .bringBox{
    border:2.6px solid var(--line);
    border-radius:4px;
    padding:1.6mm;
    min-height:10mm;
    position:relative;
    font-size: var(--bring-fs, 12pt);
  }
  .bringText[contenteditable]{min-height:8mm;outline:none}
  .picto-inline img{height:16px;vertical-align:text-bottom}

  /* Mededelingen */
  .panel{position:relative;border:2.6px solid var(--line);border-radius:7px;background:#fff;display:flex;flex-direction:column;height:1px; z-index:0;}
  .panel header{padding:2.6mm;border-bottom:2.6px solid var(--line);font-weight:700}
  .panelBody{padding:2mm;flex:1;min-height:60px;overflow:auto;outline:none}
  .panelBody:empty::before{content:'Klik hier om mededelingen te typen…';color:#adb5bd;pointer-events:none;font-style:italic}
  .sign{position:absolute;right:6mm;bottom:6mm;border:2.6px solid var(--line);border-radius:7px;padding:2mm 5mm;min-width:70mm;height:22mm;font-size:10pt;color:var(--muted);background:#fff;display:flex;align-items:flex-start}

  /* Vrije pictogrammen */
  .picto-free{
    position:absolute; left:10px; top:10px;
    cursor:grab; user-select:none; z-index:5; touch-action:none;
    outline:2px solid transparent;
  }
  .picto-free.dragging{ cursor:grabbing; }
  .picto-free.selected{ outline:2px solid #0a66c2; }
  .picto-free img{display:block;max-width:100%;max-height:100%;pointer-events:none}
  .picto-free .handle{
    position:absolute; right:-6px; bottom:-6px; width:12px; height:12px;
    border:2px solid #0a66c2; background:#e7f1fb; border-radius:3px;
    cursor:nwse-resize; touch-action:none;
  }

  /* Pictopaneel (niet in print) */
  .dock{position:fixed;right:16px;top:76px;z-index:60;width:260px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.08);padding:.7rem}
  .dock h4{margin:.1rem 0 .4rem;font-size:1rem}
  .picto-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem}
  .picto{border:1px solid #e5e7eb;border-radius:8px;background:#fafbfc;display:flex;align-items:center;justify-content:center;padding:.35rem;cursor:pointer}
  .picto:hover{background:#f0f4f8}
  .picto img{width:42px;height:42px;object-fit:contain}
  .dock small{color:#6b7280;display:block;margin-top:.35rem}
  .dock[hidden]{ display:none !important; }
  .dock .uploadRow{ margin-top:.5rem; display:flex; gap:.5rem; align-items:center; }

  /* Weekend: contenteditable vak */
  .wkCE[contenteditable]{
    display:block;
    min-height:3.2em;
    padding:.4rem .5rem;
    border:1px solid var(--line);
    border-radius:6px;
    background:#fff;
    outline:none;
    white-space:pre-wrap;
    overflow:visible;
  }

  /* PRINT */
  /* Waarschuwing: dagvak te vol voor print */
  .day.overflowing{ box-shadow: 0 0 0 2.5px #ef4444 !important; }
  .day.overflowing::after{
    content: '⚠️ te vol voor print';
    position: absolute;
    bottom: 2px; right: 4px;
    font-size: 8pt;
    color: #ef4444;
    pointer-events: none;
    z-index: 10;
  }

  @media print{
    @page{ size: A4 landscape; margin: 0 }

    .toolbar, .dock, .mini-toolbar, .klas-tabs{ display: none !important; }
    body{ background:#fff; -webkit-print-color-adjust:exact; print-color-adjust:exact; }

    [contenteditable], input, textarea { caret-color: transparent !important; }
    .day, .day *:focus { outline: none !important; }

    .page{
      width: var(--page-w);
      height: var(--page-h);
      margin: 0;
      padding: var(--m-top) var(--m-side) var(--m-side) var(--m-side);
      zoom: 0.96;
      transform: none !important;
      break-after: avoid;
      page-break-after: avoid;
      overflow: hidden;
    }

    /* Dagvakken strikt begrenzen */
    .week-top{ overflow: hidden; }
    .week-top > .day{ overflow: hidden; max-height: 130mm; }
    .day .body{ overflow: hidden; }
    .planBox{ overflow: hidden; }
    .bringBox{ overflow: hidden; }
    .picto-free{ max-width: 100%; }

    .week-top > .day,
    .bottom-row > *{
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .panelBody:empty::before{ display:none; }
    .picto-free .handle{ display:none !important; }
    .picto-free.selected{ outline:none !important; }
    .tasklist .liDel{ display:none !important; }
    .day.overflowing::after{ display:none; }
  }
</style>
</head>
<body>
  <!-- Klas-tabs -->
  <div class="klas-tabs" id="klasTabs" style="display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex">
      <button class="klas-tab" data-klas="L3">🌵 L3</button>
      <button class="klas-tab active" data-klas="L4">🦙 L4</button>
    </div>
    <a href="./klasagendav2.html" style="margin-right:.6rem;appearance:none;border:1px solid #d0d7de;background:#fff;padding:.35rem .75rem;border-radius:8px;font-weight:700;cursor:pointer;text-decoration:none;color:#111;font-family:Arial,sans-serif;font-size:.88rem;white-space:nowrap">← Keuze graad</a>
  </div>

  <div class="toolbar" role="region" aria-label="Bediening">
    <div class="group">
      <label><input id="zwemweek" type="checkbox"> Zwemweek</label>
      <span class="sep"></span>
      <label title="Tekstgrootte actieve dag">
        <select id="planFS"><option>10pt</option><option selected>11pt</option><option>12pt</option><option>14pt</option></select>
      </label>
      <button id="applyAllFS" title="Pas tekstgrootte toe op alle weekdagen">→ alle dagen</button>
      <span class="sep"></span>
      <label>Tekstkleur:
        <select id="textColor">
          <option value="#111">zwart</option>
          <option value="#0b4dad">donkerblauw</option>
          <option value="#117a2c">groen</option>
          <option value="#c22727">rood</option>
        </select>
        <button type="button" id="btnApplyColor">Pas toe</button>
      </label>
      <span class="sep"></span>
      <button id="btnCopyMon">Kopieer maandag</button>
      <button id="btnDelPicto" title="Geselecteerd pictogram verwijderen">Verwijder picto</button>
      <span class="sep"></span>
      <button id="btnExport">Export</button>
      <input id="fileImport" type="file" accept="application/json" hidden>
      <button id="btnImport">Import</button>
      <span class="sep"></span>
      <button id="btnBewaar" class="primary" style="background:#16a34a;border-color:#16a34a">📚 Bewaar in archief</button>
      <button id="btnArchief" style="background:#7c3aed;border:1px solid #7c3aed;color:#fff;appearance:none;padding:.45rem .7rem;border-radius:.5rem;cursor:pointer;font-weight:700">🗂️ Archief raadplegen</button>
      <span class="sep"></span>
      <button id="btnPrint" class="primary">PDF / Print</button>
      <button id="btnToggleDock">Pictogrammen</button>
      <button id="btnHelp" title="Uitleg & handleiding" style="background:#f59e0b;border:1px solid #f59e0b;color:#fff;appearance:none;padding:.45rem .7rem;border-radius:.5rem;cursor:pointer;font-weight:700">❓ Uitleg</button>
    </div>
  </div>

  <!-- Verborgen knoppen die nog steeds gebruikt worden door JS maar niet getoond -->
  <button id="btnAddBullet" hidden></button>
  <button id="btnBold" hidden></button>
  <button id="btnItalic" hidden></button>
  <button id="btnUnderline" hidden></button>
  <button id="btnHighlight" hidden></button>
  <button id="btnUndo" hidden></button>
  <select id="bulletSize" hidden><option value="12">klein</option><option value="14" selected>middel</option><option value="16">groot</option></select>
  <select id="taskGap" hidden><option value="4">4pt</option><option value="5">5pt</option><option value="6" selected>6pt</option></select>
  <button id="applyAllGap" hidden></button>

  <main class="page" id="page">
    <header class="page-head">
      <div class="title"><span class="pill" id="titlePill" contenteditable>agenda L4</span></div>
      <div class="right-head">
        <div class="monthBox" id="monthBox" contenteditable>september 2025</div>
        <div class="classIcon" id="classIconSlot"></div>
      </div>
    </header>

    <!-- Ma–Vr -->
    <section class="week-top" id="weekTop"></section>

    <!-- Za–Zo + Mededelingen -->
    <section class="bottom-row">
      <div class="weekendCol" id="weekendCol"></div>

      <section class="panel" id="notesPanel">
        <header>Mededelingen <span style="font-weight:400;color:#6b7280">(berichten aan leerkrachten via smartschool)</span></header>
        <div class="panelBody" id="notesBody" contenteditable></div>
        <div class="sign">handtekening ouders</div>
      </section>
    </section>
  </main>

  <!-- PICTOGRAMMEN -->
  <aside class="dock" aria-label="Pictogrammen">
    <h4>Pictogrammen</h4>
    <div class="picto-grid" id="pictoGrid"></div>
    <div class="uploadRow">
      <button id="btnUploadPicto" title="Eigen pictogram toevoegen">Eigen pictogram…</button>
      <input id="fileUploadPicto" type="file" accept="image/*" hidden>
    </div>
    <small>Klik om een vrij pictogram te plaatsen. <strong>Ctrl-klik</strong> (Mac: Cmd-klik) = als inline pictogram in de tekst.</small>
  </aside>

<script>
(function(){
  const $  = (s,r=document)=>r.querySelector(s);
  const $$ = (s,r=document)=>Array.from(r.querySelectorAll(s));

  const ENVELOPE_SVG =
   '<svg viewBox="0 0 48 36" xmlns="http://www.w3.org/2000/svg"><rect x="1.5" y="1.5" width="45" height="33" rx="2.5"/><polyline points="2,2 24,18 46,2"/><polyline points="2,34 20,20"/><polyline points="46,34 28,20"/></svg>';

  const tplSel = { value: 'L2' }; // vervangen door tab-systeem
  const swimChk=$('#zwemweek');

  /* ── Tab-systeem: L1 / L2 ── */
  let aktieveKlas = 'L4';
  const tabState = { L3: null, L4: null };

  function getKlasIcon(klas){
    return klas === 'L3' ? 'pictogrammen/cactus.png' : 'pictogrammen/lama.png';
  }

  function wisselKlas(nieuweKlas){
    if (nieuweKlas === aktieveKlas) return;

    // 1) Huidige staat opslaan onder de huidige klas
    tabState[aktieveKlas] = captureAllVoorTab();

    // 2) Tab UI bijwerken
    $$('.klas-tab').forEach(t => t.classList.toggle('active', t.dataset.klas === nieuweKlas));
    aktieveKlas = nieuweKlas;
    tplSel.value = nieuweKlas;

    // 3) DOM volledig leegmaken vóór laden
    resetAgenda(nieuweKlas);

    // 4) Nieuwe staat inladen als die bestaat
    if (tabState[nieuweKlas]){
      isApplying = true;
      // Pas dagen toe
      const obj = tabState[nieuweKlas];
      if (obj.meta?.monthBox) monthBox.textContent = obj.meta.monthBox;
      if (obj.meta?.swim !== undefined) swimChk.checked = !!obj.meta.swim;
      if (obj.meta?.notes) $('#notesBody').innerHTML = obj.meta.notes;
      if (obj.days){
        $$('.day').forEach(n => {
          const i = n.dataset.dayIndex;
          if (obj.days[i]) applyDay(n, obj.days[i]);
        });
      }
      applyPanelPictos(obj.meta?.panelPictos || []);
      isApplying = false;
    } else {
      // Eerste keer deze klas — sla lege staat op
      tabState[nieuweKlas] = captureAllVoorTab();
    }

    // 5) Logo altijd correct zetten na alles
    classIconSlot.innerHTML = `<img src="${getKlasIcon(nieuweKlas)}" alt="klaspictogram ${nieuweKlas}">`;
    $('#titlePill').textContent = 'agenda ' + nieuweKlas;

    upgradeWeekendToEditable();
    $$('.day').forEach(updatePlanBoxClass);
    ensureTaskDeleteButtons(document);
    _maxNotesH = 0;
    scheduleLayoutSync();
    requestAnimationFrame(()=> requestAnimationFrame(()=>{
      const wc = document.getElementById('weekendCol');
      if (wc && wc.offsetHeight > 50) _maxNotesH = wc.offsetHeight;
    }));
    pushSnapshot();
  }

  function resetAgenda(klas){
    $$('.day').forEach(d => {
      const idx = d.dataset.dayIndex;
      // Leeg planBox volledig
      const planBoxEl = d.querySelector(`[data-key="d${idx}.plan"]`);
      if (planBoxEl){
        // Verwijder alle takenlijst-items
        planBoxEl.querySelectorAll('.tasklist li').forEach(li => li.remove());
        // Leeg alle contenteditable vlakken
        planBoxEl.querySelectorAll('[contenteditable]').forEach(el => { el.innerHTML = ''; });
        // Leeg textarea's
        planBoxEl.querySelectorAll('textarea').forEach(el => { el.value = ''; });
        planBoxEl.classList.remove('has-tasks');
      }
      // Leeg bring (Ik denk aan)
      const br = d.querySelector(`[data-key="d${idx}.bring"]`);
      if (br) br.querySelectorAll('[contenteditable]').forEach(el => { el.innerHTML = ''; });
      // Verwijder vrije picto's
      d.querySelectorAll('.picto-free').forEach(p => p.remove());
    });
    // Leeg mededelingen
    const nb = document.getElementById('notesBody');
    if (nb) nb.innerHTML = '';
    // Titel + logo
    const tp = document.getElementById('titlePill');
    if (tp) tp.textContent = 'agenda ' + klas;
    classIconSlot.innerHTML = `<img src="${getKlasIcon(klas)}" alt="klaspictogram ${klas}">`;
    scheduleLayoutSync();
  }

  document.getElementById('klasTabs').addEventListener('click', e => {
    const tab = e.target.closest('.klas-tab');
    if (tab) wisselKlas(tab.dataset.klas);
  });
  const btnAddBullet=$('#btnAddBullet');
  const planFS=$('#planFS'), bulletSize=$('#bulletSize'), taskGap=$('#taskGap');
  const applyAllFS=$('#applyAllFS'), applyAllGap=$('#applyAllGap');
  const btnBold=$('#btnBold'), btnItalic=$('#btnItalic'), btnUnderline=$('#btnUnderline'), btnHighlight=$('#btnHighlight');

    const barH = 42;
    let top = rect.top - barH - 8 + window.scrollY;
    if (top < 8 + window.scrollY) top = rect.bottom + 6 + window.scrollY;
    let left = rect.left + window.scrollX;
    const barW = 440;
    if (left + barW > window.innerWidth - 8) left = window.innerWidth - barW - 8;
    miniBar.style.top  = top + 'px';
    miniBar.style.left = left + 'px';
    miniBar.classList.add('visible');
    vulMtPictoGrid();

  /* Undo */
  function snapshot(){
    const data=captureAll();
    data.meta.panelPictos=capturePanelPictos();
    return data;
  }
  function pushSnapshot(){
    if(!isApplying) undoStack.push(snapshot());
    scheduleLayoutSync();                // ← direct her-equalizen na elke wijziging
  }
  function doUndo(){
    if(undoStack.length<2) return;
    undoStack.pop();
    const prev=undoStack[undoStack.length-1];
    isApplying=true;
    applyAll(prev);
    applyPanelPictos(prev.meta && prev.meta.panelPictos ? prev.meta.panelPictos : []);
    isApplying=false;
    scheduleLayoutSync();
  }

  function handlePictoInsert(src, ev){
    const sel=window.getSelection();
    const ae=document.activeElement;
    const wantInline = (ev && (ev.ctrlKey || ev.metaKey));

    /* Inline in tekst */
    if (wantInline && ae && ae.isContentEditable && sel && sel.rangeCount){
      const span=document.createElement('span'); span.className='picto-inline';
      span.innerHTML=`<img src="${src}" alt="picto" style="height:16px;vertical-align:text-bottom">`;
      const r=sel.getRangeAt(0); r.deleteContents(); r.insertNode(span);
      r.setStartAfter(span); r.setEndAfter(span); sel.removeAllRanges(); sel.addRange(r);
      pushSnapshot();
      return;
    }

    /* Vrij pictogram */
    const pic = makeFreePicto(src);

    let host = null;
    if (lastFocusedHost && lastFocusedHost.isConnected) {
      host = lastFocusedHost;
    } else if (activeHost && activeHost.isConnected) {
      host = activeHost;
    } else if (activeDay) {
      host = activeDay.querySelector('.body') || activeDay;
    } else {
      alert('Klik eerst in een vak (bv. Ik denk aan, Ik plan of Mededelingen).');
      return;
    }

    let hostType = 'body';
    if (host.classList && host.classList.contains('bringBox')) {
      hostType = 'bring';
    }
    pic.dataset.host = hostType;

    host.appendChild(pic);

    // Slim plaatsen: links in het vak, kleine marge bovenaan
    pic.style.left = '4px';
    pic.style.top  = '4px';
    pushSnapshot();
  }

  function makeFreePicto(src){
    const wrap=document.createElement('div');
    wrap.className='picto-free';
    wrap.style.width='20mm';   // kleinere standaardgrootte zodat tekst ernaast past
    wrap.style.height='auto';
    wrap.style.left='4px';
    wrap.style.top='4px';
    wrap.style.position='absolute';
    wrap.style.zIndex='5';

  /* Drag+resize voor vrije pictogrammen */
  function enableDragResize(node){
    const handle = node.querySelector('.handle');

    // --- DRAG ---
    let dragging = false, pointerId=null;
    let startX=0, startY=0, hostAtStart=null;
    let offsetX=0, offsetY=0;
    let lastRAF = 0, nextLeft=0, nextTop=0, needsPaint=false;
    let origZ = '';

    function onPointerDownDrag(e){
      if(e.target === handle) return;
      e.preventDefault();
      pointerId = e.pointerId;
      node.setPointerCapture(pointerId);
      dragging = true;
      node.classList.add('dragging');

      hostAtStart = node.parentElement;
      origZ = node.style.zIndex || '5';

      const rect = node.getBoundingClientRect();
      startX = e.clientX; startY = e.clientY;
      offsetX = startX - rect.left; offsetY = startY - rect.top;

      document.body.appendChild(node);
      node.style.position = 'fixed';
      node.style.left = rect.left + 'px';
      node.style.top  = rect.top  + 'px';
      node.style.zIndex = '10000';

      nextLeft = rect.left; nextTop  = rect.top;
      needsPaint = false;
    }

    function onPointerMoveDrag(e){
      if(!dragging || e.pointerId !== pointerId) return;
      nextLeft = Math.max(0, Math.min(e.clientX - offsetX, window.innerWidth  - node.offsetWidth));
      nextTop  = Math.max(0, Math.min(e.clientY - offsetY, window.innerHeight - node.offsetHeight));
      if (!needsPaint){
        needsPaint = true;
        lastRAF = requestAnimationFrame(()=>{
          node.style.left = nextLeft + 'px';
          node.style.top  = nextTop  + 'px';
          needsPaint = false;
        });
      }
    }

    function onPointerUpDrag(e){
      if(!dragging || e.pointerId !== pointerId) return;
      try { node.releasePointerCapture(pointerId); } catch(_) {}
      dragging = false; pointerId = null;
      node.classList.remove('dragging');
      if (lastRAF) cancelAnimationFrame(lastRAF);

      const oldPE = node.style.pointerEvents;
      node.style.pointerEvents = 'none';
      const dropEl = document.elementFromPoint(e.clientX, e.clientY);
      node.style.pointerEvents = oldPE;

      let host = dropEl ? dropEl.closest('.bringBox, .panel, .day .body, .day') : null;
      if(!host) host = hostAtStart || document.querySelector('.page');

      const nodeRect = node.getBoundingClientRect();
      const hostRect = host.getBoundingClientRect();

      let leftInHost = nodeRect.left - hostRect.left;
      let topInHost  = nodeRect.top  - hostRect.top;

      leftInHost = Math.max(0, Math.min(leftInHost, hostRect.width  - node.offsetWidth));
      topInHost  = Math.max(0, Math.min(topInHost,  hostRect.height - node.offsetHeight));

      host.appendChild(node);
      node.style.position = 'absolute';
      node.style.left = leftInHost + 'px';
      node.style.top  = topInHost  + 'px';
      node.style.zIndex = origZ || '5';

      if (host.classList && host.classList.contains('bringBox')) {
        node.dataset.host = 'bring';
      } else if (host.closest && host.closest('.day')) {
        node.dataset.host = 'body';
      }

      pushSnapshot();
    }

    function onPointerCancelDrag(){
      if (!dragging) return;
      dragging = false; pointerId = null;
      node.classList.remove('dragging');
      node.style.zIndex = origZ || '5';
    }

    node.addEventListener('pointerdown', onPointerDownDrag);
    node.addEventListener('pointermove', onPointerMoveDrag);
    node.addEventListener('pointerup',   onPointerUpDrag);
    node.addEventListener('pointercancel', onPointerCancelDrag);
    window.addEventListener('pointerup', (ev)=>{ if (dragging) onPointerUpDrag(ev); });

    // --- RESIZE ---
    let resizing=false, baseW=0, baseX=0, resizePointerId=null;
    function onPointerDownResize(e){
      e.preventDefault(); e.stopPropagation();
      resizePointerId = e.pointerId;
      handle.setPointerCapture(resizePointerId);
      resizing=true; baseW = node.offsetWidth; baseX = e.clientX;
    }
    function onPointerMoveResize(e){
      if(!resizing || e.pointerId !== resizePointerId) return;
      const dw = e.clientX - baseX;
      const nw = Math.max(16, baseW + dw);
      node.style.width = nw + 'px';
    }
    function onPointerUpResize(e){
      if(!resizing || e.pointerId !== resizePointerId) return;
      try { handle.releasePointerCapture(resizePointerId); } catch(_) {}
      resizing=false; resizePointerId=null;
      pushSnapshot();
    }
    handle.addEventListener('pointerdown', onPointerDownResize);
    handle.addEventListener('pointermove', onPointerMoveResize);
    handle.addEventListener('pointerup',   onPointerUpResize);
    handle.addEventListener('pointercancel', ()=>{ resizing=false; resizePointerId=null; });
  }

function _isEmptyWeekendHtml(html){
  const tmp = document.createElement('div');

  const hasTasks = !!tmp.querySelector('.tasklist li');
  const text = tmp.textContent.replace(/\u00a0/g,' ').trim();
  return { isEmpty: (!hasTasks && text === ''), hasTasks, tmp };
}

  function applyDay(d,data){

if (ce) {
  const hasWeekendHtml = Object.prototype.hasOwnProperty.call(data, 'weekendHtml');
  const hasWeekendText = Object.prototype.hasOwnProperty.call(data, 'weekendText');
  const hasPlan        = (typeof data.plan === 'string' && data.plan.trim() !== '');

  let done = false;

  // 1) Probeer weekendHtml, maar alleen als het niet “leeg” is
  if (hasWeekendHtml) {
    const chk = _isEmptyWeekendHtml(data.weekendHtml);
    if (!chk.isEmpty) {
      if (chk.hasTasks) {
        // weekendHtml bevatte (oude) <ul class="tasklist"> → zet die over

        ce.innerHTML = data.weekendHtml || '';
      }
      done = true;
    }
  }

  // 2) Anders weekendText (platte tekst)
  if (!done && hasWeekendText && (data.weekendText || '').trim() !== '') {
    ce.textContent = data.weekendText.trim();
    done = true;
  }

  // 3) Anders fallback: haal bruikbare inhoud uit plan (oud export-formaat)
  if (!done && hasPlan) {
    const tmp = document.createElement('div');
    tmp.innerHTML = data.plan;
    const ul = tmp.querySelector('.tasklist');

      const box = ce.closest('.planBox');
      box.innerHTML = '';
      box.appendChild(ul.cloneNode(true));
      box.classList.add('has-tasks');
      ensureTaskDeleteButtons(box);
    } else {
      ce.textContent = tmp.textContent.replace(/\u00a0/g,' ').trim();
    }
  }

  // Als nog steeds niets gezet is: leeg
  if (!done && !hasWeekendText && !hasPlan) {
    ce.innerHTML = '';
  }

    } else if (ta) {
      if (Object.prototype.hasOwnProperty.call(data, 'weekendText')) {
        ta.value = data.weekendText || '';
        limitWeekendTextarea({ target: ta });
      }

      planBoxEl.innerHTML = data.plan || '';

    const br=d.querySelector(`[data-key="d${idx}.bring"]`);

    if(data.vars){

    d.querySelectorAll('.picto-free').forEach(n=>n.remove());

    if (data.pictos) {

    if (e.key === 'Enter'){
      e.preventDefault();
      try { document.execCommand('insertLineBreak'); }
      catch(_){ document.execCommand('insertHTML', false, '<br>'); }
      window._klasagenda.pushSnapshot(); return;
    }
    if (e.key === 'Backspace'){
      const sel = window.getSelection();
      const atStart = sel && sel.anchorOffset === 0 && sel.isCollapsed;
      const isEmpty = (t.innerText || '').trim() === '';
      if (atStart && isEmpty){
        const li  = t.closest('li');
        const day = t.closest('.day');
        e.preventDefault();
        li?.remove();
        if (day) updatePlanBoxClass(day);
        window._klasagenda.pushSnapshot();
      }
    }
  });

  document.addEventListener('blur', (e)=>{
    const t = e.target;
    if (!t || !t.classList || !t.classList.contains('tasktext')) return;
    if ((t.innerText || '').trim() === ''){
      const li  = t.closest('li');
      const day = t.closest('.day');
      li?.remove();
      if (day) updatePlanBoxClass(day);
      window._klasagenda.pushSnapshot();
    }
  }, true);

  document.addEventListener('keydown', (e)=>{
    if (e.key === 'Delete') {
      const node = selectedPicto || document.querySelector('.picto-free.selected');
      if (node) { node.remove(); selectedPicto=null; window._klasagenda.pushSnapshot(); }
    }
  });

  document.addEventListener('click', (e)=>{
    if(!e.target.classList.contains('liDel')) return;
    const li   = e.target.closest('li');
    const day  = e.target.closest('day');
    li?.remove();
    const dd = e.target.closest('.day');
    if (dd) updatePlanBoxClass(dd);
    window._klasagenda.pushSnapshot();
  });

})();

              if (wc && wc.offsetHeight > 50) _maxNotesH = wc.offsetHeight;
            }));
            toonArchiefToast(`✅ Hele week van ${naam} overgenomen — inclusief picto's!`);
            return;
          }

          // ── Mededelingen ──
          if (type === 'notes'){
            const notesBody = document.getElementById('notesBody');
            if (notesBody){
              notesBody.innerHTML = obj.meta?.notes || '';
              toonArchiefToast('✅ Mededelingen van '+naam+' zijn ingeplakt!');
            }
            return;
          }

          // ── Dag-onderdeel ──
          const dag = obj.days?.[dayIdx];
          if (!dag){ alert('Dag niet gevonden.'); return; }
          const doelIdx = await kiesDagModal(naam, DAGNAMES2[parseInt(dayIdx)]);
          if (doelIdx === null) return;

          const doelDag = [...document.querySelectorAll('.day')].find(d=>parseInt(d.dataset.dayIndex)===doelIdx);
          if (!doelDag){ alert('Doeldag niet gevonden.'); return; }

          const idx2 = doelDag.dataset.dayIndex;

          if (type === 'plan' || type === 'alles'){
            const planBoxEl = doelDag.querySelector(`[data-key="d${idx2}.plan"]`);
            const ta = planBoxEl?.querySelector('.wkTA');
            const ce = planBoxEl?.querySelector('.wkCE[contenteditable]');
            if (ce) ce.innerHTML = dag.weekendHtml || dag.plan || '';
            else if (ta) ta.value = dag.weekendText || '';
            else if (planBoxEl) planBoxEl.innerHTML = dag.plan || '';
          }
          if (type === 'bring' || type === 'alles'){
            const br = doelDag.querySelector(`[data-key="d${idx2}.bring"]`);
            if (br) br.innerHTML = dag.bring || '';
          }
          if (type === 'alles' && dag.pictos){
            doelDag.querySelectorAll('.picto-free').forEach(p=>p.remove());
            dag.pictos.forEach(p=>{
              const node = window._klasagenda.makeFreePicto(p.src);
              node.style.left = p.left || '4px';
              node.style.top  = p.top  || '4px';
              if (p.width) node.style.width = p.width;
              const hostEl = p.host === 'bring'
                ? (doelDag.querySelector(`[data-key="d${idx2}.bring"]`) || doelDag)
                : (doelDag.querySelector('.body') || doelDag);
              node.dataset.host = p.host || 'body';
              hostEl.appendChild(node);
            });
          }
          window._klasagenda.pushSnapshot();
          toonArchiefToast('✅ '+DAGNAMES2[parseInt(dayIdx)]+' van '+naam+' ingeplakt in '+DAGNAMES2[doelIdx]+'!');
        } catch(e){
          alert('Fout: '+e.message);
        }
        btn.textContent = origTekst;
        btn.disabled = false;
      });
    });
  }

  function dagHeeftInhoudArchief(dag, type){
    if (!dag) return false;
    const html = type==='bring' ? (dag.bring||'') : (dag.plan||dag.weekendHtml||'');
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    return tmp.textContent.trim().length > 0;
  }

  // Dag-kiezer mini-modal
  function kiesDagModal(vanNaam, vanDag){
    return new Promise(resolve=>{
      const ov = document.createElement('div');
      ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9000;display:flex;align-items:center;justify-content:center';
      const box = document.createElement('div');
      box.style.cssText = 'background:#fff;border-radius:12px;padding:20px 24px;max-width:340px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.18);font-family:Arial,sans-serif';
      box.innerHTML = `<p style="margin:0 0 .8rem;font-weight:700;font-size:.95rem">In welke dag van jouw agenda plakken?<br><span style="font-weight:400;color:#6b7280;font-size:.85rem">Van: ${vanDag} van ${vanNaam}</span></p>
        <div style="display:grid;gap:.35rem" id="kiesDagLijst"></div>
        <button id="kiesDagAnnul" style="margin-top:.8rem;border:1px solid #d1d5db;background:#f9fafb;padding:.4rem .9rem;border-radius:7px;cursor:pointer;font-size:.88rem">Annuleer</button>`;
      ov.appendChild(box);
      document.body.appendChild(ov);

      const lijst = box.querySelector('#kiesDagLijst');
      document.querySelectorAll('.day').forEach(d=>{
        const i = parseInt(d.dataset.dayIndex);
        const naam = DAGNAMES2[i] || ('Dag '+i);
        const dp = d.querySelector('.datePicker');
        const datum = dp?.value ? new Date(dp.value).toLocaleDateString('nl-BE',{day:'numeric',month:'short'}) : '';
        const btn2 = document.createElement('button');
        btn2.style.cssText = 'text-align:left;padding:.4rem .7rem;border:1.5px solid #e5e7eb;border-radius:7px;cursor:pointer;background:#fff;font-size:.88rem;font-family:Arial,sans-serif';
        btn2.innerHTML = `<strong>${naam}</strong> <span style="color:#6b7280;font-size:.8rem">${datum}</span>`;
        btn2.onmouseover = ()=>btn2.style.borderColor='#7c3aed';
        btn2.onmouseout  = ()=>btn2.style.borderColor='#e5e7eb';
        btn2.onclick = ()=>{ document.body.removeChild(ov); resolve(i); };
        lijst.appendChild(btn2);
      });

      box.querySelector('#kiesDagAnnul').onclick = ()=>{ document.body.removeChild(ov); resolve(null); };
    });
  }

  function toonArchiefToast(tekst){
    let t = document.getElementById('archiefToast');
    if (!t){
      t = document.createElement('div');
      t.id = 'archiefToast';
      t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#111;color:#fff;padding:.7rem 1.2rem;border-radius:10px;font-size:.92rem;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:320px;line-height:1.4';
      document.body.appendChild(t);
    }
    t.textContent = tekst;
    t.style.opacity = '1';
    setTimeout(()=>t.style.opacity='0', 4000);
  }

  /* ══════════════════════════════════════════
     UITLEG-MODAL
     ══════════════════════════════════════════ */
  const helpModal = document.createElement('div');
  helpModal.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9500;align-items:center;justify-content:center;padding:1rem';
  helpModal.innerHTML = `
    <div style="background:#fff;border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2);font-family:Arial,sans-serif">
      <div style="padding:18px 22px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1">
        <strong style="font-size:1.1rem">❓ Handleiding klasagenda</strong>
        <button id="helpModalSluit" style="border:none;background:none;font-size:1.4rem;cursor:pointer;color:#6b7280;line-height:1">✕</button>
      </div>
      <div style="padding:20px 22px;line-height:1.65;font-size:.93rem;color:#374151">

        <h3 style="margin:.5rem 0 .4rem;color:#0a66c2;font-size:1rem">🖊 Typen in de agenda</h3>
        <p style="margin:0 0 .6rem">Klik gewoon in een dagvak om te beginnen typen. Zodra je klikt verschijnt er een <strong>donker balkje</strong> (mini-toolbar) boven de dag met alle opmaakopties.</p>

        <h3 style="margin:1rem 0 .4rem;color:#0a66c2;font-size:1rem">🎨 Mini-toolbar (verschijnt boven dag)</h3>
        <ul style="margin:.2rem 0 .6rem;padding-left:1.2rem">
          <li><strong>B / I / U</strong> — vet, schuin, onderlijnd (ook via Ctrl+B/I/U)</li>
          <li><strong>🖊</strong> — tekst markeren in geel</li>
          <li><strong>A− / A+</strong> — geselecteerde tekst kleiner of groter maken</li>
          <li><strong>Dropdown (8pt–24pt)</strong> — lettergrootte van geselecteerde tekst kiezen</li>
          <li><strong>● +</strong> — bolletje toevoegen om aan te vinken</li>
          <li><strong>Dropdown klein/middel/groot</strong> — grootte van alle bolletjes in die dag</li>
          <li><strong>🖼</strong> — pictogram invoegen (grid verschijnt, klik een picto)</li>
          <li><strong>↩</strong> — laatste actie ongedaan maken</li>
        </ul>

        <h3 style="margin:1rem 0 .4rem;color:#0a66c2;font-size:1rem">🖼 Pictogrammen</h3>
        <ul style="margin:.2rem 0 .6rem;padding-left:1.2rem">
          <li>Klik in een dagvak → klik 🖼 in de mini-toolbar → kies een picto</li>
          <li>Het picto verschijnt <strong>links in het vak</strong> — je kan ernaast typen</li>
          <li><strong>Versleep</strong> een picto door erop te klikken en te slepen</li>
          <li><strong>Groter/kleiner</strong> maken via het blauwe hoekje rechtsonder</li>
          <li><strong>Rechtermuisklik</strong> op een picto → menu: verwijder / kleiner / groter</li>
          <li>Via knop <em>Pictogrammen</em> in de toolbar open je het volledige picto-paneel</li>
        </ul>

        <h3 style="margin:1rem 0 .4rem;color:#0a66c2;font-size:1rem">🌵🦙 Tabs L3 / L4</h3>
        <p style="margin:0 0 .6rem">Bovenaan staan twee tabs: <strong>L3</strong> en <strong>L4</strong>. Elke leerkracht klikt op haar eigen klas. De agenda's staan volledig los van elkaar — wat je in L3 typt, ziet L4 niet en omgekeerd. Wisselen van tab bewaart automatisch de huidige inhoud.</p>

        <h3 style="margin:1rem 0 .4rem;color:#16a34a;font-size:1rem">📚 Bewaar in archief</h3>
        <p style="margin:0 0 .3rem">Sla je ingevulde agenda op in het gedeeld archief zodat collega's die kunnen raadplegen.</p>
        <ul style="margin:.2rem 0 .6rem;padding-left:1.2rem">
          <li>Klik <strong>📚 Bewaar in archief</strong> → vul je naam, klas en weeknummer in</li>
          <li><strong>Bewaar per week</strong>: sla elke week apart op (december week 1, december week 2, …)</li>
          <li>Zo kan je later altijd een specifieke week terugvinden</li>
          <li>Heb je een week al bewaard en wil je die bijwerken? Bewaar gewoon opnieuw met dezelfde naam/klas/week — die overschrijft de vorige versie</li>
        </ul>

        <h3 style="margin:1rem 0 .4rem;color:#7c3aed;font-size:1rem">🗂️ Archief raadplegen</h3>
        <p style="margin:0 0 .3rem">Bekijk agenda's van andere leerkrachten en neem wat je nodig hebt over.</p>
        <ul style="margin:.2rem 0 .6rem;padding-left:1.2rem">
          <li>Klik <strong>🗂️ Archief raadplegen</strong> → kies graad, klas, jaar, maand en week → <em>Zoeken</em></li>
          <li><strong>↙ Hele week overnemen</strong> — kopieert alle dagen + mededelingen + picto's in één klik</li>
          <li><strong>↙ Plan overnemen</strong> — kopieert enkel het plan van die dag</li>
          <li><strong>↙ Ik denk aan overnemen</strong> — kopieert enkel de "ik denk aan" van die dag</li>
          <li><strong>↙ Hele dag overnemen</strong> — plan + ik denk aan van die dag samen</li>
          <li><strong>↙ Plak mededelingen</strong> — kopieert de mededelingen</li>
          <li>Je kan altijd een vorig schooljaar opzoeken via de jaar-selector</li>
        </ul>

        <h3 style="margin:1rem 0 .4rem;color:#0a66c2;font-size:1rem">💾 Export / Import</h3>
        <p style="margin:0 0 .6rem"><strong>Export</strong> slaat je agenda op als bestand op je computer (.json). <strong>Import</strong> laadt zo'n bestand terug in. Handig als backup of om te delen via e-mail.</p>

        <h3 style="margin:1rem 0 .4rem;color:#0a66c2;font-size:1rem">🖨️ Afdrukken</h3>
        <p style="margin:0 0 .6rem">Klik <strong>PDF / Print</strong> om de agenda af te drukken op A4 liggend. De toolbar en tabs verdwijnen automatisch in de afdruk.</p>

        <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:.8rem 1rem;margin-top:1rem;font-size:.88rem;color:#1e40af">
          💡 <strong>Tip:</strong> Bewaar je agenda <strong>elke week</strong> in het archief — zo bouw je een volledig overzicht op per maand. Collega's kunnen dan snel jouw agenda raadplegen en de onderdelen overnemen die voor hen ook gelden.
        </div>

        <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:.8rem 1rem;margin-top:.6rem;font-size:.88rem;color:#991b1b">
          ⚠️ <strong>Te vol voor print?</strong> Als een dagvak een <strong>rode rand</strong> krijgt, past de inhoud niet meer op één A4. Oplossing: klik in dat vak → selecteer alle tekst (Ctrl+A) → klik <strong>A−</strong> in de mini-toolbar om de tekst te verkleinen. Voor picto's: rechtermuisklik → <strong>Kleiner</strong>.
        </div>

      </div>
    </div>
  `;
  document.body.appendChild(helpModal);
  document.getElementById('helpModalSluit').onclick = ()=>{ helpModal.style.display='none'; };
  helpModal.addEventListener('click', e=>{ if(e.target===helpModal) helpModal.style.display='none'; });
  document.getElementById('btnHelp').addEventListener('click', ()=>{ helpModal.style.display='flex'; });

  btnBewaar && btnBewaar.addEventListener('click', async () => {
    const input = await toonModal();
    if (!input) return;

    // Haal agenda-data op (zelfde als Export)
    const captureAll = window._captureAll || null;
    let data;
    try {
      // captureAll is gedefinieerd in de hoofdscript via IIFE → we vangen het via een tijdelijke knop-simulatie
      // Alternatief: we lezen de JSON direct via de Export-knop logica
      // We dupliceren captureAll hier beknopt:
      const tplSel  = document.getElementById('tpl');
      const monthBox = document.getElementById('monthBox');
      const swimChk  = document.getElementById('zwemweek');
      const titlePill = document.getElementById('titlePill');
      const classIconSlot = document.getElementById('classIconSlot');
      const notesBody = document.getElementById('notesBody');

      function captureDayArchief(d){
        const idx = d.dataset.dayIndex;
        const planBoxEl = d.querySelector(`[data-key="d${idx}.plan"]`);
        const ta = planBoxEl ? planBoxEl.querySelector('.wkTA') : null;
        const ce = planBoxEl ? planBoxEl.querySelector('.wkCE[contenteditable]') : null;
        const pics = [...d.querySelectorAll('.picto-free')].map(p => {
          const img = p.querySelector('img');
          return { src: img.getAttribute('src'), left: p.style.left||'0px', top: p.style.top||'0px', width: p.style.width||'', host: p.dataset.host||'body' };
        });
        return {
          date: d.querySelector('.datePicker').value || null,
          plan: planBoxEl ? planBoxEl.innerHTML : '',
          bring: d.querySelector(`[data-key="d${idx}.bring"]`)?.innerHTML || '',
          vars: {
            planFS:  d.style.getPropertyValue('--plan-fs')  || null,
            bullet:  d.style.getPropertyValue('--bullet')   || null,
            gap:     d.style.getPropertyValue('--task-gap') || null,
            bringFS: d.style.getPropertyValue('--bring-fs') || null
          },
          pictos: pics,
          weekendText: ta ? ta.value : null,
          weekendHtml: ce ? ce.innerHTML : null
        };
      }

      const meta = {
        template:   tplSel ? tplSel.value : 'L2',
        title:      titlePill ? titlePill.textContent : '',
        monthBox:   monthBox ? monthBox.textContent : '',
        swim:       swimChk ? swimChk.checked : false,
        classIcon:  (classIconSlot && classIconSlot.querySelector('img')) ? classIconSlot.querySelector('img').src : null,
        notes:      notesBody ? notesBody.innerHTML : '',
        archiefNaam: input.naam,
        archiefKlas: input.klas,
        graad:       GRAAD,
        opgeslagen:  new Date().toISOString()
      };
      const days = {};
      document.querySelectorAll('.day').forEach(n => { days[n.dataset.dayIndex] = captureDayArchief(n); });
      data = { meta, days };
    } catch(e) {
      alert('Fout bij ophalen agenda: ' + e.message);
      return;
    }

    // Pad: archief/1stegraad/2025/oktober/week1/juf-zisa-L1
    const { jaar, maand, week } = input;
    const naamSlug = input.naam.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-');
    const path = `archief/${GRAAD}/${jaar}/${maand}/week${week}/${naamSlug}-${input.klas}`;

    try {
      await dbSet(path, data);
      alert(`✅ Agenda bewaard in het archief!\n\nJe collega kan die vinden via:\nArchief → Tweede graad → ${maand} ${jaar} → week ${week}`);
    } catch(e) {
      alert('❌ Kon niet bewaren: ' + e.message + '\n\nControleer je internetverbinding.');
    }
  });

})();
</script>
</body>
