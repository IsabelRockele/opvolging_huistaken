<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groeigroepen</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--bg:#f7f4ee;--panel:#fff;--text:#26313d;--muted:#667085;--line:#d8ded8;--green:#6f9f62;--green2:#e9f4e6;--blue:#426fae;--blue2:#e9eef8;--yellow:#f6d76b;--warn:#fff1c7;--danger:#f5c2c7;--shadow:0 8px 24px rgba(38,49,61,.08)}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
header{background:linear-gradient(135deg,#6b5d52,#8a7a6d);color:#fff;padding:16px 22px;display:flex;justify-content:space-between;gap:14px;align-items:center;flex-wrap:wrap}
.brand{display:flex;gap:13px;align-items:center}
.brand img{width:52px;height:52px;border-radius:10px;background:#fff;padding:4px;object-fit:contain}
h1{font-size:23px;margin:0}.sub{font-size:13px;opacity:.82;margin-top:3px}
button,.button{border:0;border-radius:10px;background:var(--yellow);color:var(--text);font-weight:800;padding:9px 13px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;font:inherit}
button.secondary,.button.secondary{background:var(--green2);border:1px solid #b8d7b1}
button.ghost,.button.ghost{background:#f0f2f4;border:1px solid var(--line)}
button.danger{background:var(--danger)}
button.small{font-size:12px;padding:6px 9px}
button:disabled{opacity:.55;cursor:not-allowed}
main{width:min(1500px,calc(100vw - 28px));margin:18px auto;display:grid;grid-template-columns:330px 1fr;gap:16px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:16px}
.side-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}
h2{margin:0 0 12px;font-size:18px}h3{margin:0 0 8px;font-size:15px}
.muted{color:var(--muted);font-size:13px;line-height:1.45}
input,select,textarea{width:100%;font:inherit;border:1px solid var(--line);border-radius:9px;padding:9px 10px;background:#fff}
textarea{min-height:86px;resize:vertical}
label{display:block;font-weight:800;font-size:12px;color:#44515f;margin:8px 0 4px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.groups{display:grid;gap:8px}
.group-card{border:1px solid var(--line);background:#fbfcfb;border-radius:12px;padding:11px;text-align:left;cursor:pointer}
.group-card.active{border-color:var(--green);background:var(--green2)}
.group-card strong{display:block;font-size:15px}.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.tag{display:inline-flex;background:#eef2f7;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:800;color:#44515f}
.tag.green{background:var(--green2);color:#315b2b}.tag.blue{background:var(--blue2);color:#264f8b}
.tabs{display:flex;gap:7px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:14px}
.tab{background:#f0f2f4}.tab.active{background:var(--yellow)}
.empty{text-align:center;padding:36px;color:var(--muted)}
.student-list{display:grid;gap:7px;max-height:410px;overflow:auto;padding-right:4px}
.class-block{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
.class-title{width:100%;justify-content:space-between;background:#f6f8fa;border-radius:0}
.class-students{display:none;padding:8px}.class-block.open .class-students{display:grid;gap:5px}
.check-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px}
.check-row:hover{background:#f6f8fa}.check-row input{width:auto}
.basket{display:grid;gap:7px;max-height:410px;overflow:auto}
.basket-item{display:flex;justify-content:space-between;gap:10px;align-items:center;background:var(--green2);border:1px solid #bdd9b6;border-radius:10px;padding:8px 10px}
.student-pill{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:5px 9px;background:#fff;margin:3px;font-size:12px;font-weight:800}
.log-item,.test-item,.report-card{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fbfcfe;margin-bottom:10px}
.log-meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:7px}
.eval-grid{display:grid;gap:9px;margin-top:8px}
.eval-row{display:grid;grid-template-columns:1fr 2fr 1.2fr;gap:8px;align-items:start;border:1px solid var(--line);border-radius:10px;background:#fff;padding:9px}
.log-domain-scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:7px}
.log-domain-scores label{margin:0}
.score{display:flex;gap:2px}.score button{padding:3px 6px;border-radius:6px;background:#eef2f7;font-size:12px}.score button.active{background:var(--yellow)}
.domain-grid{display:grid;grid-template-columns:repeat(3,minmax(180px,1fr));gap:8px}
.domain-box{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}
.domain-box.active{background:var(--blue2);border-color:#a9bde0}
.domain-box input[type=checkbox]{width:auto;margin-right:6px}
.report-preview{background:#fff;border:1px solid var(--line);border-radius:4px;padding:34px 46px;margin:12px auto 0;max-width:820px;min-height:1050px;color:#0f2438}
.report-header{display:grid;grid-template-columns:92px 1fr;gap:20px;align-items:start;margin-bottom:34px}
.report-logo{width:90px;height:90px;object-fit:contain}
.report-preview h3{color:var(--green);font-size:28px;margin:0 0 12px;text-transform:none;letter-spacing:0}
.report-info{display:grid;grid-template-columns:1fr 1fr;gap:14px 36px;background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:18px 20px;margin-bottom:26px;font-weight:800}
.report-legend{font-size:12px;color:#536681;font-weight:800;margin-bottom:26px}
.report-domain-preview{border:1px solid var(--line);border-radius:8px;min-height:108px;padding:16px 18px;margin-bottom:8px;background:#fff}
.report-domain-head{display:flex;justify-content:space-between;gap:14px;font-weight:900;font-size:16px;margin-bottom:8px}
.report-domain-score{color:#d49a16;letter-spacing:1px}
.report-section-title{font-size:16px;font-weight:900;margin:22px 0 8px}
.report-section-text{min-height:44px;white-space:pre-wrap}
.report-signatures{display:grid;grid-template-columns:1fr 1fr;gap:50px;border-top:1px solid var(--line);margin-top:70px;padding-top:26px;color:#536681;font-size:12px}
.rapport-grid{display:grid;gap:10px;margin-top:12px}
.rapport-row{display:grid;grid-template-columns:minmax(210px,.55fr) 1.45fr;gap:8px;align-items:start;border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px}
.rapport-row-head{font-weight:900}
.rapport-cell{display:grid;gap:6px}
.rapport-cell-title{font-size:12px;font-weight:900;color:var(--blue)}
.rapport-domain-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:8px}
.rapport-domain-card{border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px}
.rapport-extra{border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px;margin-top:10px}
.rapport-extra-list{display:flex;flex-wrap:wrap;gap:7px}
.rapport-extra-list label{display:inline-flex;align-items:center;gap:6px;margin:0;background:#f8fafc;border:1px solid var(--line);border-radius:999px;padding:6px 10px;color:var(--text)}
.copy-panel{border:1px solid var(--line);border-radius:12px;background:#fbfcfb;padding:12px;margin-top:12px}
.copy-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:6px;margin-top:8px;max-height:170px;overflow:auto}
.copy-list label{display:flex;align-items:center;gap:7px;margin:0;background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 9px;font-weight:700;color:var(--text)}
.copy-list input,.copy-options input{width:auto}
.copy-options{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.stars{color:#d49a16;letter-spacing:1px;font-weight:900}
.hidden{display:none!important}
@media(max-width:980px){main{grid-template-columns:1fr}.eval-row,.grid2,.domain-grid,.rapport-row,.report-info,.report-header{grid-template-columns:1fr}.report-preview{padding:22px 18px;min-height:auto}}
@media print{body{background:#fff}header,.sidebar,.tabs,.no-print,.editor{display:none!important}main{display:block;width:auto;margin:0}.panel{box-shadow:none;border:0}.report-preview{border:0;padding:0}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <img src="afbeeldingen/schoollogo.png" alt="Schoollogo" onerror="this.style.display='none'">
    <div><h1>Groeigroepen</h1><div id="status" class="sub">Laden...</div></div>
  </div>
  <div class="row">
    <input id="schooljaar" value="2026-2027" style="width:112px" aria-label="Schooljaar">
    <a class="button ghost" href="index.html">Home</a>
    <button id="logoutBtn" class="ghost">Uitloggen</button>
  </div>
</header>

<main>
  <aside class="panel sidebar">
    <div class="side-head">
      <h2>Groepen</h2>
      <button id="newGroupBtn" class="secondary small">Nieuwe groep</button>
    </div>
    <input id="groupSearch" placeholder="Zoek groep of leerling...">
    <div id="groups" class="groups" style="margin-top:12px"></div>
  </aside>

  <section class="panel">
    <div id="emptyState" class="empty">Kies links een groeigroep of maak een nieuwe groep.</div>
    <div id="workspace" class="hidden">
      <div class="row" style="justify-content:space-between;margin-bottom:12px">
        <div>
          <h2 id="groupTitle">Groeigroep</h2>
          <div id="groupMeta" class="muted"></div>
        </div>
        <div class="row no-print">
          <button id="carryGroupBtn" class="ghost">Naar volgend schooljaar</button>
          <button id="saveGroupBtn" class="secondary">Bewaren</button>
          <button id="deleteGroupBtn" class="danger">Verwijderen</button>
        </div>
      </div>
      <div class="tabs no-print">
        <button class="tab active" data-tab="basis">Basis</button>
        <button class="tab" data-tab="leerlingen">Leerlingen</button>
        <button class="tab" data-tab="logboek">Logboek</button>
        <button class="tab" data-tab="toetsen">Toetsjes</button>
        <button class="tab" data-tab="rapport">Rapport</button>
      </div>
      <div id="tab-basis" class="tabPanel"></div>
      <div id="tab-leerlingen" class="tabPanel hidden"></div>
      <div id="tab-logboek" class="tabPanel hidden"></div>
      <div id="tab-toetsen" class="tabPanel hidden"></div>
      <div id="tab-rapport" class="tabPanel hidden"></div>
    </div>
  </section>
</main>

<script type="module">
import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyA7KxXMvZ4dzBQDut3CMyWUblLte2tFzoQ",authDomain:"huiswerkapp-a311e.firebaseapp.com",projectId:"huiswerkapp-a311e",storageBucket:"huiswerkapp-a311e.appspot.com",messagingSenderId:"797169941164",appId:"1:797169941164:web:511d9618079f1378d0fd09"};
const app=getApps().length?getApp():initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const allowedRoles=["directie","zorgcoordinator","zorgleerkracht"];
const DEFAULT_CLASSES=["1A","2A","3A","4A","5A","6A"];
const DOMAINEN=[
  {id:"lezen",groep:"Nederlands",naam:"Lezen"},{id:"spelling",groep:"Nederlands",naam:"Spelling"},{id:"spreken",groep:"Nederlands",naam:"Spreken"},{id:"luisteren",groep:"Nederlands",naam:"Luisteren"},{id:"woordenschat",groep:"Nederlands",naam:"Woordenschat"},{id:"schrijven",groep:"Nederlands",naam:"Schrijven"},
  {id:"getallen",groep:"Wiskunde",naam:"Getallen"},{id:"hoofdrekenen",groep:"Wiskunde",naam:"Hoofdrekenen"},{id:"cijferen",groep:"Wiskunde",naam:"Cijferen"},{id:"meten",groep:"Wiskunde",naam:"Meten en metend rekenen"},{id:"meetkunde",groep:"Wiskunde",naam:"Meetkunde"},
  {id:"wo",groep:"WO",naam:"Wereldorientatie"}
];
const $=id=>document.getElementById(id);
const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
const uid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);
const studentKey=s=>`${s.klas}__${s.leerlingId}`;
function studentNaam(s){
  const id=String(s.leerlingId||s.id||"");
  const first=String(s.firstName||s.first||s.voornaam||"").trim();
  const last=String(s.lastName||s.last||s.achternaam||"").trim();
  const direct=String(s.naam||s.name||s.fullName||s.volledigeNaam||"").trim();
  if(first||last) return last ? `${last}, ${first}`.replace(/, $/,"") : first;
  if(direct && direct!==id) return direct;
  return "Naam ontbreekt";
}
function studentUitKlas(klas,s){
  const leerlingId=String(s.id||s.leerlingId||uid());
  const item={
    klas,
    leerlingId,
    firstName:s.firstName||s.first||s.voornaam||"",
    lastName:s.lastName||s.last||s.achternaam||""
  };
  item.naam=studentNaam({...s,...item});
  return item;
}
function naamMatchKey(s){
  const first=String(s.firstName||s.first||s.voornaam||"").trim().toLowerCase();
  const last=String(s.lastName||s.last||s.achternaam||"").trim().toLowerCase();
  if(first||last) return `${first}|${last}`;
  const naam=String(s.naam||s.name||s.fullName||s.volledigeNaam||"").replace(/\s+/g," ").trim().toLowerCase();
  return naam.includes(",")
    ? naam.split(",").map(x=>x.trim()).reverse().join("|")
    : naam;
}
function verrijkLeerling(s){
  const huidigeNaam=String(s.naam||"").trim();
  const mistNaam=!huidigeNaam||huidigeNaam==="Naam ontbreekt"||huidigeNaam===String(s.leerlingId||"");
  if(!mistNaam) return s;
  const bron=(classes[s.klas]?.leerlingen||[]).find(x=>String(x.id||x.leerlingId)===String(s.leerlingId));
  return bron ? studentUitKlas(s.klas,bron) : {...s,naam:studentNaam(s)};
}
const today=()=>new Date().toISOString().slice(0,10);
let user=null, role="", groups=[], active=null, classes={}, tab="basis";

function year(){return ($("schooljaar").value||"2026-2027").trim();}
function volgendSchooljaar(jaar=year()){
  const m=String(jaar).match(/^(\d{4})-(\d{4})$/);
  return m ? `${Number(m[1])+1}-${Number(m[2])+1}` : jaar;
}
function groupRef(id){return doc(db,"zorggroepen",id);}
function emptyGroup(){return{id:"zg_"+uid(),schooljaar:year(),naam:"Nieuwe groeigroep",domeinen:["lezen"],begeleiders:user?.email||"",doelen:"",leerlingen:[],logboek:[],toetsen:[],rapporten:{},createdAt:new Date().toISOString()};}
function setStatus(text){$("status").textContent=text;}
function normalizeGroup(g){g.leerlingen=Array.isArray(g.leerlingen)?g.leerlingen.map(verrijkLeerling):[];g.logboek=Array.isArray(g.logboek)?g.logboek:[];g.toetsen=Array.isArray(g.toetsen)?g.toetsen:[];g.domeinen=Array.isArray(g.domeinen)?g.domeinen:[];g.rapporten=g.rapporten||{};return g;}

async function loadRole(){
  const snap=await getDoc(doc(db,"schoolrollen",user.uid));
  role=snap.exists()?String(snap.data().rol||"").toLowerCase():"";
  if(!allowedRoles.includes(role)) throw new Error("Dit scherm is alleen voor zorgleerkrachten, zorgcoordinator en directie.");
}
async function loadClasses(){
  const snap=await getDocs(collection(db,"schoolbeheer",year(),"klassen"));
  classes={};
  snap.docs.forEach(d=>{const data=d.data();classes[d.id]={klas:d.id,leerlingen:Array.isArray(data.leerlingen)?data.leerlingen:[]};});
  DEFAULT_CLASSES.forEach(k=>{if(!classes[k])classes[k]={klas:k,leerlingen:[]};});
}
async function loadClassesForYear(jaar){
  const snap=await getDocs(collection(db,"schoolbeheer",jaar,"klassen"));
  const result={};
  snap.docs.forEach(d=>{const data=d.data();result[d.id]={klas:d.id,leerlingen:Array.isArray(data.leerlingen)?data.leerlingen:[]};});
  DEFAULT_CLASSES.forEach(k=>{if(!result[k])result[k]={klas:k,leerlingen:[]};});
  return result;
}
async function loadGroups(){
  try{
    const snap=await getDocs(query(collection(db,"zorggroepen"),where("schooljaar","==",year())));
    groups=snap.docs.map(d=>normalizeGroup({id:d.id,...d.data()})).sort((a,b)=>(a.naam||"").localeCompare(b.naam||"","nl"));
    renderGroups();
  }catch(e){
    groups=[];
    renderGroups();
    throw new Error("Groeigroepen konden niet uit Firebase geladen worden. Controleer of de regel voor zorggroepen is toegevoegd en gepubliceerd.");
  }
}
async function reloadAll(){
  setStatus("Laden...");
  await loadClasses();
  await loadGroups();
  setStatus(`${role} - ${year()} - ${Object.keys(classes).length} klassen`);
  if(active){active=groups.find(g=>g.id===active.id)||active;renderWorkspace();}
}

function renderGroups(){
  const term=($("groupSearch").value||"").toLowerCase();
  const list=groups.filter(g=>!term||[g.naam,g.begeleiders,g.doelen,...(g.leerlingen||[]).map(studentNaam)].join(" ").toLowerCase().includes(term));
  $("groups").innerHTML=list.length?list.map(g=>`
    <button class="group-card ${active?.id===g.id?"active":""}" data-id="${esc(g.id)}">
      <strong>${esc(g.naam||"Naamloos")}</strong>
      <span class="muted">${g.leerlingen.length} leerling(en)</span>
      <div class="tags">${(g.domeinen||[]).slice(0,3).map(d=>`<span class="tag green">${esc(domainName(d))}</span>`).join("")}</div>
    </button>`).join(""):`<div class="empty">Nog geen groeigroepen.</div>`;
  document.querySelectorAll(".group-card").forEach(btn=>btn.onclick=()=>openGroup(btn.dataset.id));
}
function openGroup(id){active=normalizeGroup(groups.find(g=>g.id===id));tab="basis";renderGroups();renderWorkspace();}
function domainName(id){return DOMAINEN.find(d=>d.id===id)?.naam||id;}
function switchTab(next){
  if(active&&tab==="basis"){
    collectBasis();
    persistActiveGroup("Basis bewaard").catch(()=>{});
  }
  tab=next;
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  document.querySelectorAll(".tabPanel").forEach(p=>p.classList.add("hidden"));
  $(`tab-${tab}`).classList.remove("hidden");
  renderWorkspace();
}

function renderWorkspace(){
  $("emptyState").classList.toggle("hidden",!!active);
  $("workspace").classList.toggle("hidden",!active);
  if(!active)return;
  $("groupTitle").textContent=active.naam||"Groeigroep";
  $("groupMeta").textContent=`${active.leerlingen.length} leerling(en) - ${active.begeleiders||"geen begeleider ingevuld"}`;
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  renderBasis();renderLeerlingen();renderLogboek();renderToetsen();renderRapport();
  document.querySelectorAll(".tabPanel").forEach(p=>p.classList.add("hidden"));
  $(`tab-${tab}`).classList.remove("hidden");
}
function renderBasis(){
  $("tab-basis").innerHTML=`
    <div class="editor">
      <div class="grid2">
        <div><label>Naam groeigroep</label><input id="gNaam" value="${esc(active.naam)}"></div>
        <div><label>Begeleiders</label><input id="gBegeleiders" value="${esc(active.begeleiders)}" placeholder="juf An, juf Els..."></div>
      </div>
      <label>Doelen en aanpak</label><textarea id="gDoelen" placeholder="Waar werken jullie aan? Wat is de aanpak?">${esc(active.doelen)}</textarea>
      <label>Domeinen die bij deze groep horen</label>
      <div class="domain-grid">${DOMAINEN.map(d=>`
        <label class="domain-box ${active.domeinen.includes(d.id)?"active":""}">
          <input type="checkbox" value="${esc(d.id)}" ${active.domeinen.includes(d.id)?"checked":""}> ${esc(d.groep)} - ${esc(d.naam)}
        </label>`).join("")}</div>
    </div>`;
}
function allStudents(){
  return Object.values(classes).flatMap(c=>(c.leerlingen||[]).map(s=>({
    ...studentUitKlas(c.klas,s)
  }))).sort((a,b)=>studentNaam(a).localeCompare(studentNaam(b),"nl"));
}
function renderLeerlingen(){
  $("tab-leerlingen").innerHTML=`
    <div class="grid2">
      <div>
        <h3>Leerlingen uit schoolbeheer</h3>
        <input id="studentSearch" placeholder="Zoek naam of klas..." oninput="window.ggRenderPicker()">
        <div id="studentPicker" class="student-list" style="margin-top:10px"></div>
      </div>
      <div>
        <h3>Mandje</h3>
        <div class="muted" style="margin-bottom:8px">Dit is meteen de markering: bij deze kinderen hoort dit zorgtraject.</div>
        <div id="chosenStudentsBasket" class="basket"></div>
      </div>
    </div>`;
  window.ggRenderPicker=()=>{
    const term=($("studentSearch")?.value||"").toLowerCase();
    const chosen=new Set(active.leerlingen.map(studentKey));
    $("studentPicker").innerHTML=Object.values(classes).sort((a,b)=>a.klas.localeCompare(b.klas,"nl",{numeric:true})).map(c=>{

function collectCurrentChildReport(){

  const key=currentReportKey();

  active.rapportActieveLeerling=key;
  const current=studentReport(key);
  const next={...current,domeinen:{...(current.domeinen||{})},updatedAt:new Date().toISOString()};
  DOMAINEN.forEach(d=>{
    const extra=document.querySelector(`[data-extra="${key}|${d.id}"]`)?.checked||false;
    const score=document.querySelector(`[data-score="${key}|${d.id}"]`)?.value??next.domeinen[d.id]?.score??"";
    const tekst=document.querySelector(`[data-text="${key}|${d.id}"]`)?.value??next.domeinen[d.id]?.tekst??"";
    next.domeinen[d.id]={...(next.domeinen[d.id]||{}),actiefExtra:extra,score,tekst};
  });
  active.rapporten[key]=next;
}

window.ggFillReportScoresFromLog=function(){
  collectCurrentChildReport();
  const key=currentReportKey();
  let ingevuld=0;
  actieveRapportDomeinenVoorStudent(key).forEach(id=>{
    const scores=(active.logboek||[]).map(l=>{
      const perDomein=l.evaluaties?.[key]?.domeinen?.[id]?.score;
      const oudAlgemeen=l.evaluaties?.[key]?.vordering;
      return Number(perDomein||oudAlgemeen||0);
    }).filter(Boolean);
    if(!scores.length) return;
    const voorstel=Math.max(1,Math.min(4,Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)));
    if(!active.rapporten[key].domeinen[id]?.score) active.rapporten[key].domeinen[id]={...(active.rapporten[key].domeinen[id]||{}),score:String(voorstel)};
    ingevuld++;
  });
  if(!ingevuld) return alert("Voor deze leerling zijn er nog geen logboekinschattingen bij de gekozen onderdelen.");
  renderRapportStudent();
};

function stars(n){n=Number(n)||0;return "****".slice(0,n)+"....".slice(0,4-n);}
function sterrenLabel(n){n=Number(n)||0;return n ? "*".repeat(n)+".".repeat(4-n) : "....";}
function studentByKey(key){return active?.leerlingen.find(s=>studentKey(s)===key);}
function veiligeBestandsnaam(text){
  return String(text||"rapport").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9_-]+/gi,"_").replace(/^_+|_+$/g,"")||"rapport";
}
async function imageAsDataUrl(url){
  try{
    const res=await fetch(url);
    if(!res.ok) return "";
    const blob=await res.blob();
    return await new Promise(resolve=>{
      const reader=new FileReader();
      reader.onload=()=>resolve(reader.result);
      reader.onerror=()=>resolve("");
      reader.readAsDataURL(blob);
    });
  }catch(e){return "";}
}
function pdfText(doc,text,x,y,maxWidth,lineHeight=5){
  const lines=doc.splitTextToSize(String(text||""),maxWidth);
  doc.text(lines,x,y);
  return y+(lines.length*lineHeight);
}
function pdfSectionTitle(doc,title,x,y){
  doc.setFont("helvetica","bold");
  doc.setTextColor(38,49,61);
  doc.text(title,x,y);
  doc.setFont("helvetica","normal");
  return y+6;
}
async function downloadCurrentReportPdf(){
  collectCurrentChildReport();
  const key=currentReportKey();
  const report=active.rapporten[key]||studentReport(key);
  const s=studentByKey(key);
  const groep=active.rapportGroep||{};
  const doelen=groep.doelen||{};
  const domeinen=actieveRapportDomeinenVoorStudent(key);
  const jsPdf=window.jspdf?.jsPDF;
  if(!jsPdf) return alert("PDF maken lukt niet omdat de PDF-bibliotheek niet geladen is.");

  const doc=new jsPdf({unit:"mm",format:"a4"});
  const pageW=doc.internal.pageSize.getWidth();
  const pageH=doc.internal.pageSize.getHeight();
  const margin=18;
  let y=18;
  const logo=await imageAsDataUrl("afbeeldingen/schoollogo.png");
  if(logo) doc.addImage(logo,"PNG",margin,y,24,24);
  doc.setFont("helvetica","bold");
  doc.setFontSize(22);
  doc.setTextColor(111,159,98);
  doc.text("Aangepast rapport",logo?48:margin,y+9);
  doc.setFontSize(10);
  doc.setFont("helvetica","normal");
  doc.setTextColor(102,112,133);
  doc.text(groep.periode||"Rapportperiode",logo?48:margin,y+17);
  y+=34;

  doc.setDrawColor(216,222,216);
  doc.setFillColor(248,250,252);
  doc.roundedRect(margin,y,pageW-(margin*2),24,2,2,"FD");
  doc.setFont("helvetica","bold");
  doc.setTextColor(38,49,61);
  doc.text(`Naam: ${s?.naam||"Leerling"}`,margin+5,y+8);
  doc.text(`Klas: ${s?.klas||""}`,margin+5,y+16);
  doc.text(`Zorggroep: ${active.naam||""}`,pageW/2,y+8);
  doc.text(`Periode: ${groep.periode||""}`,pageW/2,y+16);
  y+=34;

  doc.setFontSize(9);
  doc.setTextColor(102,112,133);
  y=pdfText(doc,"Legende: *... = nog veel hulp nodig, **.. = op weg, ***. = goed bezig, **** = sterk.",margin,y,pageW-(margin*2),4)+4;
  doc.setFontSize(11);

  for(const id of domeinen){
    const d=report.domeinen?.[id]||{};
    const goalLines=doelen[id]?doc.splitTextToSize(String(doelen[id]),pageW-(margin*2)-10):[];
    const textLines=d.tekst?doc.splitTextToSize(String(d.tekst),pageW-(margin*2)-10):[];
    const cardH=Math.max(28,16+(goalLines.length*4)+(textLines.length*4));
    if(y>pageH-cardH-45){doc.addPage();y=18;}
    doc.setDrawColor(216,222,216);
    doc.setFillColor(255,255,255);
    doc.roundedRect(margin,y,pageW-(margin*2),cardH,2,2,"FD");
    let cardY=y+8;
    doc.setFont("helvetica","bold");
    doc.setTextColor(38,49,61);
    doc.text(domainName(id),margin+5,cardY);
    doc.setTextColor(212,154,22);
    doc.text(sterrenLabel(d.score),pageW-margin-26,cardY);
    cardY+=6;
    doc.setFont("helvetica","normal");
    doc.setTextColor(102,112,133);
    if(goalLines.length){doc.text(goalLines,margin+5,cardY);cardY+=goalLines.length*4;}
    doc.setTextColor(38,49,61);
    if(textLines.length){doc.text(textLines,margin+5,cardY+2);}
    y+=cardH+4;
  }

  if(y>pageH-65){doc.addPage();y=18;}
  y=pdfSectionTitle(doc,"Zo werkten we deze periode",margin,y);
  y=pdfText(doc,groep.traject||"",margin,y,pageW-(margin*2),5)+5;
  y=pdfSectionTitle(doc,"Volgende periode",margin,y);
  y=pdfText(doc,groep.volgendeStap||"",margin,y,pageW-(margin*2),5)+10;
  doc.setDrawColor(216,222,216);
  doc.line(margin,y,pageW-margin,y);
  doc.setFontSize(9);
  doc.setTextColor(102,112,133);
  doc.text("Handtekening leerkracht",margin,y+10);
  doc.text("Handtekening ouders",pageW/2,y+10);

  doc.save(`Aangepast_rapport_${veiligeBestandsnaam(s?.naam)}_${veiligeBestandsnaam(groep.periode)}.pdf`);
}
function collectBasis(){
  active.naam=$("gNaam")?.value.trim()||active.naam;
  active.begeleiders=$("gBegeleiders")?.value.trim()||"";
  active.doelen=$("gDoelen")?.value.trim()||"";
  active.domeinen=[...document.querySelectorAll('input[value][type="checkbox"]')].filter(i=>DOMAINEN.some(d=>d.id===i.value)&&i.checked).map(i=>i.value);
}
async function saveGroup(){
  if(!active)return;
  if(tab==="basis")collectBasis();
  try{
    await persistActiveGroup();
    await loadGroups();
    active=groups.find(g=>g.id===active.id)||active;
    renderWorkspace();
  }catch(e){
    throw e;
  }
}
async function persistActiveGroup(doneText){
  if(!active)return;
  active.schooljaar=year();
  try{
    await setDoc(groupRef(active.id),{...active,updatedAt:serverTimestamp(),updatedBy:user.email||user.uid},{merge:true});
    const tekst=doneText||("Bewaard om "+new Date().toLocaleTimeString("nl-BE",{hour:"2-digit",minute:"2-digit"}));
    setStatus(tekst);
  }catch(e){
    const msg="Bewaren lukte niet. Waarschijnlijk ontbreken de Firebase-regels voor zorggroepen of zijn ze nog niet gepubliceerd.";
    setStatus(msg);
    alert(msg);
    throw e;
  }
}
async function carryActiveGroupToNextYear(){
  if(!active) return alert("Kies eerst een groeigroep.");
  if(tab==="basis") collectBasis();
  const huidig=year();
  const volgend=volgendSchooljaar(huidig);
  if(!confirm(`Groeigroep "${active.naam}" overnemen naar ${volgend}?\n\nDe leerlingen worden op naam gezocht in de nieuwe klaslijsten. Logboek, toetsjes en rapportgegevens blijven mee bewaard.`)) return;

  const targetClasses=await loadClassesForYear(volgend);
  const index=new Map();
  Object.values(targetClasses).forEach(c=>{
    (c.leerlingen||[]).forEach(raw=>{
      const leerling=studentUitKlas(c.klas,raw);
      const key=naamMatchKey(leerling);
      if(key && !index.has(key)) index.set(key,leerling);
    });
  });

  const keyMap={};
  let matched=0;
  const leerlingen=active.leerlingen.map(old=>{
    const nieuw=index.get(naamMatchKey(old));
    if(nieuw){
      keyMap[studentKey(old)]=studentKey(nieuw);
      matched++;
      return {...nieuw, vorigSchooljaar:huidig, vorigeKlas:old.klas, vorigeLeerlingId:old.leerlingId};
    }
    return {...old, vorigSchooljaar:huidig, nietTeruggevondenInKlaslijst:true};
  });

  const remapObjectKeys=obj=>{
    const next={};
    Object.entries(obj||{}).forEach(([key,value])=>{next[keyMap[key]||key]=value;});
    return next;
  };
  const copied={
    ...active,
    id:"zg_"+uid(),
    schooljaar:volgend,
    vorigGroepId:active.id,
    overgenomenVanSchooljaar:huidig,
    leerlingen,
    logboek:(active.logboek||[]).map(item=>({...item,evaluaties:remapObjectKeys(item.evaluaties)})),
    toetsen:(active.toetsen||[]).map(item=>({...item,studentKey:keyMap[item.studentKey]||item.studentKey})),
    rapporten:remapObjectKeys(active.rapporten),
    createdAt:new Date().toISOString(),
    updatedAt:new Date().toISOString(),
    updatedBy:user.email||user.uid
  };
  await setDoc(groupRef(copied.id),{...copied,updatedAt:serverTimestamp()},{merge:true});
  $("schooljaar").value=volgend;
  active=copied;
  await reloadAll();
  active=groups.find(g=>g.id===copied.id)||copied;
  renderGroups();
  renderWorkspace();
  setStatus(`Overgenomen naar ${volgend}: ${matched}/${leerlingen.length} leerling(en) teruggevonden in nieuwe klaslijsten.`);
}
window.ggToggleStudent=async(klas,id,checked)=>{
  const c=classes[klas];const src=(c.leerlingen||[]).find(s=>String(s.id)===String(id));if(!src)return;
  const s=studentUitKlas(klas,src);
  active.leerlingen=checked?[...active.leerlingen.filter(x=>studentKey(x)!==studentKey(s)),s]:active.leerlingen.filter(x=>studentKey(x)!==studentKey(s));
  renderChosenStudentsBasket();
  renderGroups();
  await persistActiveGroup("Leerlingen bewaard");
};
window.ggRemoveStudent=async key=>{
  active.leerlingen=active.leerlingen.filter(s=>studentKey(s)!==key);
  const checkbox=document.querySelector(`[data-student-key="${CSS.escape(key)}"]`);
  if(checkbox) checkbox.checked=false;
  renderChosenStudentsBasket();
  renderGroups();
  await persistActiveGroup("Leerlingen bewaard");
};
window.ggAddLog=async()=>{
  const evals={};
  const domeinen=gekozenLogDomeinen();
  if(!domeinen.length) return alert("Kies eerst minstens een onderdeel, bijvoorbeeld lezen of spelling.");
  active.leerlingen.forEach(s=>{
    const k=studentKey(s);
    const perDomein={};
    domeinen.forEach(id=>{perDomein[id]={score:$(`log_${k}_${id}`)?.value||""};});
    evals[k]={domeinen:perDomein,opmerking:$(`opm_${k}`)?.value||""};
  });
  active.logboek.push({id:uid(),datum:$("logDatum").value||today(),titel:$("logTitel").value||"Notitie",tekst:$("logTekst").value||"",domeinen,auteur:user.email||"",evaluaties:evals});
  await saveGroup();tab="logboek";renderWorkspace();
};
window.ggAddTest=async()=>{
  active.toetsen.push({id:uid(),studentKey:$("testStudent").value,datum:$("testDatum").value||today(),titel:$("testTitel").value||"Momentopname",resultaat:$("testResultaat").value||"",opmerking:$("testOpm").value||"",auteur:user.email||""});
  await saveGroup();tab="toetsen";renderWorkspace();
};
window.ggSaveReport=async()=>{
  collectCurrentChildReport();
  const key=currentReportKey();
  renderReportPreview(key,active.rapporten[key]);
  await saveGroup();
};
window.ggSaveAndNextReport=async()=>{
  collectCurrentChildReport();
  const key=currentReportKey();
  const idx=active.leerlingen.findIndex(s=>studentKey(s)===key);
  await saveGroup();
  const next=active.leerlingen[Math.min(idx+1,active.leerlingen.length-1)]||active.leerlingen[0];
  active.rapportActieveLeerling=studentKey(next);
  tab="rapport";
  renderWorkspace();
};
window.ggRapportVorige=()=>{
  collectCurrentChildReport();
  const key=currentReportKey();
  const idx=active.leerlingen.findIndex(s=>studentKey(s)===key);
  const prev=active.leerlingen[Math.max(idx-1,0)]||active.leerlingen[0];
  active.rapportActieveLeerling=studentKey(prev);
  renderRapport();
};
window.ggDownloadReportPdf=async()=>{
  await window.ggSaveReport();
  await downloadCurrentReportPdf();
};

$("newGroupBtn").onclick=async()=>{
  active=emptyGroup();
  groups=[active,...groups];
  tab="basis";
  renderGroups();
  renderWorkspace();
  try{await saveGroup();}catch(e){}
};
$("carryGroupBtn").onclick=carryActiveGroupToNextYear;
$("saveGroupBtn").onclick=saveGroup;
$("deleteGroupBtn").onclick=async()=>{if(!active||!confirm("Deze groeigroep verwijderen?"))return;await deleteDoc(groupRef(active.id));active=null;await loadGroups();renderWorkspace();};
$("groupSearch").oninput=renderGroups;
$("schooljaar").onchange=reloadAll;
$("logoutBtn").onclick=()=>signOut(auth);
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));

onAuthStateChanged(auth,async u=>{
  if(!u){location.href="index.html";return;}
  user=u;
  try{await loadRole();await reloadAll();}
  catch(e){setStatus("Geen toegang");$("groups").innerHTML="";$("emptyState").innerHTML=`<div class="empty">${esc(e.message)}</div>`;}
});
</script>
