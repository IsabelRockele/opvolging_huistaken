<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groeigroepen</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@twemoji/api@15.1.0/dist/twemoji.min.js"></script>
<style>
:root{--bg:#f7f4ee;--panel:#fff;--text:#26313d;--muted:#667085;--line:#d8ded8;--green:#6f9f62;--green2:#e9f4e6;--blue:#426fae;--blue2:#e9eef8;--yellow:#f6d76b;--warn:#fff1c7;--danger:#f5c2c7;--shadow:0 8px 24px rgba(38,49,61,.08)}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
header{background:linear-gradient(135deg,#6b5d52,#8a7a6d);color:#fff;padding:16px 22px;display:flex;justify-content:space-between;gap:14px;align-items:center;flex-wrap:wrap}
.brand{display:flex;gap:13px;align-items:center}
.brand img{width:52px;height:52px;border-radius:10px;background:#fff;padding:4px;object-fit:contain}
h1{font-size:23px;margin:0}.sub{font-size:13px;opacity:.82;margin-top:3px}
button,.button{border:0;border-radius:10px;background:var(--yellow);color:var(--text);font-weight:800;padding:9px 13px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;font:inherit}
button.secondary,.button.secondary{background:var(--green2);border:1px solid #b8d7b1}
button.ghost,.button.ghost{background:#f0f2f4;border:1px solid var(--line)}
button.danger{background:var(--danger)}
button.small{font-size:12px;padding:6px 9px}
button:disabled{opacity:.55;cursor:not-allowed}
main{width:min(1500px,calc(100vw - 28px));margin:18px auto;display:grid;grid-template-columns:330px 1fr;gap:16px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:16px}
.side-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}
h2{margin:0 0 12px;font-size:18px}h3{margin:0 0 8px;font-size:15px}
.muted{color:var(--muted);font-size:13px;line-height:1.45}
input,select,textarea{width:100%;font:inherit;border:1px solid var(--line);border-radius:9px;padding:9px 10px;background:#fff}
textarea{min-height:86px;resize:vertical}
label{display:block;font-weight:800;font-size:12px;color:#44515f;margin:8px 0 4px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.groups{display:grid;gap:8px}
.group-card{border:1px solid var(--line);background:#fbfcfb;border-radius:12px;padding:11px;text-align:left;cursor:pointer}
.group-card.active{border-color:var(--green);background:var(--green2)}
.group-card strong{display:block;font-size:15px}.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.tag{display:inline-flex;background:#eef2f7;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:800;color:#44515f}
.tag.green{background:var(--green2);color:#315b2b}.tag.blue{background:var(--blue2);color:#264f8b}
.tabs{display:flex;gap:7px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:14px}
.tab{background:#f0f2f4}.tab.active{background:var(--yellow)}
.empty{text-align:center;padding:36px;color:var(--muted)}
.student-list{display:grid;gap:7px;max-height:410px;overflow:auto;padding-right:4px}
.class-block{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
.class-title{width:100%;justify-content:space-between;background:#f6f8fa;border-radius:0}
.class-students{display:none;padding:8px}.class-block.open .class-students{display:grid;gap:5px}
.check-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px}
.check-row:hover{background:#f6f8fa}.check-row input{width:auto}
.basket{display:grid;gap:7px;max-height:410px;overflow:auto}
.basket-item{display:flex;justify-content:space-between;gap:10px;align-items:center;background:var(--green2);border:1px solid #bdd9b6;border-radius:10px;padding:8px 10px}
.student-pill{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:5px 9px;background:#fff;margin:3px;font-size:12px;font-weight:800}
.log-item,.test-item,.report-card{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fbfcfe;margin-bottom:10px}
.log-meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:7px}
.eval-grid{display:grid;gap:9px;margin-top:8px}
.eval-row{display:grid;grid-template-columns:1fr 2fr 1.2fr;gap:8px;align-items:start;border:1px solid var(--line);border-radius:10px;background:#fff;padding:9px}
.log-domain-scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:7px}
.log-domain-scores label{margin:0}
.score{display:flex;gap:2px}.score button{padding:3px 6px;border-radius:6px;background:#eef2f7;font-size:12px}.score button.active{background:var(--yellow)}
.domain-grid{display:grid;grid-template-columns:repeat(3,minmax(180px,1fr));gap:8px}
.domain-box{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}
.domain-box.active{background:var(--blue2);border-color:#a9bde0}
.domain-box input[type=checkbox]{width:auto;margin-right:6px}
.report-preview{background:#fff;border:1px solid var(--line);border-radius:4px;padding:34px 46px;margin:12px auto 0;max-width:820px;min-height:1050px;color:#0f2438}
.report-header{display:grid;grid-template-columns:92px 1fr;gap:20px;align-items:start;margin-bottom:34px}
.report-logo{width:90px;height:90px;object-fit:contain}
.report-preview h3{color:var(--green);font-size:28px;margin:0 0 12px;text-transform:none;letter-spacing:0}
.report-info{display:grid;grid-template-columns:1fr 1fr;gap:14px 36px;background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:18px 20px;margin-bottom:26px;font-weight:800}
.report-legend{font-size:12px;color:#536681;font-weight:800;margin-bottom:26px}
.report-domain-preview{border:1px solid var(--line);border-radius:8px;min-height:108px;padding:16px 18px;margin-bottom:8px;background:#fff}
.report-domain-head{display:flex;justify-content:space-between;gap:14px;font-weight:900;font-size:16px;margin-bottom:8px}
.report-domain-score{color:#d49a16;letter-spacing:1px}
.report-section-title{font-size:16px;font-weight:900;margin:22px 0 8px}
.report-section-text{min-height:44px;white-space:pre-wrap}
.report-signatures{display:grid;grid-template-columns:1fr 1fr;gap:50px;border-top:1px solid var(--line);margin-top:70px;padding-top:26px;color:#536681;font-size:12px}
.rapport-grid{display:grid;gap:10px;margin-top:12px}
.rapport-row{display:grid;grid-template-columns:minmax(210px,.55fr) 1.45fr;gap:8px;align-items:start;border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px}
.rapport-row-head{font-weight:900}
.rapport-cell{display:grid;gap:6px}
.rapport-cell-title{font-size:12px;font-weight:900;color:var(--blue)}
.rapport-domain-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:8px}
.rapport-domain-card{border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px}
.rapport-extra{border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px;margin-top:10px}
.rapport-extra-list{display:flex;flex-wrap:wrap;gap:7px}
.rapport-extra-list label{display:inline-flex;align-items:center;gap:6px;margin:0;background:#f8fafc;border:1px solid var(--line);border-radius:999px;padding:6px 10px;color:var(--text)}
.copy-panel{border:1px solid var(--line);border-radius:12px;background:#fbfcfb;padding:12px;margin-top:12px}
.copy-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:6px;margin-top:8px;max-height:170px;overflow:auto}
.copy-list label{display:flex;align-items:center;gap:7px;margin:0;background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 9px;font-weight:700;color:var(--text)}
.copy-list input,.copy-options input{width:auto}
.copy-options{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.stars{color:#d49a16;letter-spacing:1px;font-weight:900}
.eindejaar-kaart{border:1px solid #bdd9b6;background:#f5fbf3;border-radius:12px;padding:12px;margin:0 0 14px}
.eindejaar-kaart h3{margin:0 0 6px;color:#315b2b}
.eindejaar-kaart ol{margin:8px 0 0 20px;padding:0;color:#44515f;font-size:13px;line-height:1.5}
.eindejaar-kaart li{margin:3px 0}
.eindejaar-kaart .waarom{background:#fff;border-left:4px solid var(--green);border-radius:8px;padding:8px 10px;margin-top:10px;color:#44515f;font-size:13px}
.hidden{display:none!important}
@media(max-width:980px){main{grid-template-columns:1fr}.eval-row,.grid2,.domain-grid,.rapport-row,.report-info,.report-header{grid-template-columns:1fr}.report-preview{padding:22px 18px;min-height:auto}}
@media print{body{background:#fff}header,.sidebar,.tabs,.no-print,.editor{display:none!important}main{display:block;width:auto;margin:0}.panel{box-shadow:none;border:0}.report-preview{border:0;padding:0}}
.ster{display:inline-block}
/* ---- Groeirapport PDF-fiche (groeirapport-pdf-codex) ---- */
#grpdfWrap{font-family:'Nunito','Segoe UI',Arial,sans-serif;color:#26313d;line-height:1.5;background:#fff;width:720px;max-width:720px}
#grpdfWrap img.emoji{height:1em;width:1em;vertical-align:-0.15em;margin:0 .03em}
#grpdfWrap .gr-hoofding{display:flex;align-items:center;gap:18px;border-bottom:3px solid #5f8f3e;padding-bottom:12px}
#grpdfWrap .gr-logo{width:84px;height:84px;flex:0 0 84px;object-fit:contain}
#grpdfWrap .gr-logo-leeg{width:84px;height:84px;flex:0 0 84px;border:2px dashed #b5c49d;border-radius:12px;background:#eef4e6;display:flex;align-items:center;justify-content:center;text-align:center;color:#76945a;font-size:10px;font-weight:700;padding:5px}
#grpdfWrap .gr-school{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#5f8f3e;margin:0}
#grpdfWrap .gr-hoofding h1{margin:2px 0 3px;font-size:25px;font-weight:800}
#grpdfWrap .gr-sub{margin:0;color:#64748b;font-size:12.5px;font-style:italic}
#grpdfWrap .gr-kind{display:grid;grid-template-columns:1.5fr 0.7fr 1.4fr 1.3fr;margin:14px 0 4px;border:1px solid #dfe5ec;border-radius:10px;overflow:hidden}
#grpdfWrap .gr-kind div{padding:8px 11px;border-right:1px solid #dfe5ec;min-width:0}
#grpdfWrap .gr-kind div:last-child{border-right:none}
#grpdfWrap .gr-kind .lab{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#64748b;font-weight:800;margin-bottom:1px}
#grpdfWrap .gr-kind .waarde{font-size:13px;font-weight:700;overflow-wrap:break-word}
#grpdfWrap .gr-kind .waarde-sub{font-size:11.5px;font-weight:600;color:#64748b}
#grpdfWrap .gr-legende{display:flex;gap:16px;flex-wrap:wrap;font-size:10.5px;color:#64748b;margin:8px 2px 14px;align-items:center}
#grpdfWrap .gr-legende b{display:inline-flex;align-items:center}
#grpdfWrap .gr-legende .ster{font-size:11px}
#grpdfWrap h2.gr-domein{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin:18px 0 8px;color:#26313d}
#grpdfWrap h2.gr-domein .bol{width:10px;height:10px;border-radius:50%;flex:0 0 10px;background:#94a3b8}
#grpdfWrap h2.gr-domein.nl .bol{background:#426fae}
#grpdfWrap h2.gr-domein.wis .bol{background:#5f8f3e}
#grpdfWrap h2.gr-domein.wo .bol{background:#c98a2b}
#grpdfWrap h2.gr-domein .rest{flex:1;height:1px;background:#dfe5ec}
#grpdfWrap table.gr-eval{width:100%;border-collapse:collapse;font-size:12.5px}
#grpdfWrap table.gr-eval th{text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#64748b;font-weight:800;padding:0 9px 5px;border-bottom:1.5px solid #dfe5ec}
#grpdfWrap table.gr-eval td{padding:8px 9px;border-bottom:1px solid #edf1f5;vertical-align:middle}
#grpdfWrap table.gr-eval tr:last-child td{border-bottom:none}
#grpdfWrap td.gr-dom{width:150px;font-weight:800}
#grpdfWrap td.gr-dom .pic{font-size:20px;margin-right:7px;vertical-align:middle}
#grpdfWrap td.gr-dom .nm{vertical-align:middle}
#grpdfWrap td.gr-doel{width:200px;color:#3c4a5c;font-style:italic;font-size:12px}
#grpdfWrap td.gr-sterren{width:96px;white-space:nowrap}
#grpdfWrap td.gr-sterren .ster{font-size:16px;letter-spacing:2px}
#grpdfWrap td.gr-woordje{color:#3c4a5c}
#grpdfWrap tr.nl td.gr-dom{border-left:3px solid #426fae;background:#e9eef8}
#grpdfWrap tr.wis td.gr-dom{border-left:3px solid #5f8f3e;background:#e9f4e6}
#grpdfWrap tr.wo td.gr-dom{border-left:3px solid #c98a2b;background:#fbf0dc}
#grpdfWrap .gr-traject{background:#fef9e7;border-left:4px solid #f6d76b;border-radius:8px;padding:11px 15px;margin:14px 0 6px;font-size:12.5px}
#grpdfWrap .gr-volgende{background:#eef4e6;border-left:4px solid #8fbf6f}
#grpdfWrap .gr-traject .kop{font-size:10px;text-transform:uppercase;letter-spacing:.07em;font-weight:800;color:#8a6d1f;margin:0 0 5px}
#grpdfWrap .gr-volgende .kop{color:#4f7a33}
#grpdfWrap .gr-traject p{margin:4px 0;line-height:1.55}
#grpdfWrap .gr-handtekeningen{display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;margin-top:30px}
#grpdfWrap .gr-handtekeningen .vak{border-top:1.5px solid #26313d;padding-top:6px;font-size:11px;color:#64748b}
#grpdfWrap .gr-handtekeningen .vak b{display:block;color:#26313d;font-size:12px}
/* leerling-tabs in rapport (rapport-leerlingtabs-codex) */
.lln-tabs{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 4px;border-bottom:2px solid var(--line);padding-bottom:0}
.lln-tab{border:1px solid var(--line);border-bottom:none;background:#f1efe9;color:var(--muted);padding:8px 14px;border-radius:8px 8px 0 0;cursor:pointer;font-weight:700;font-size:13px;font-family:inherit}
.lln-tab:hover{background:#e9e6df}
.lln-tab.actief{background:#fff;color:var(--text);border-color:var(--green);border-bottom:2px solid #fff;margin-bottom:-2px;box-shadow:0 -2px 6px rgba(38,49,61,.05)}
.lln-tab .vink{color:var(--green);margin-left:4px}
.algemeen-blok{background:#fbfcfb;border:1px solid var(--line);border-radius:12px;margin-bottom:4px}
.algemeen-blok summary{cursor:pointer;padding:12px 16px;font-weight:800;list-style:none;display:flex;align-items:center;gap:8px}
.algemeen-blok summary::-webkit-details-marker{display:none}
.algemeen-blok summary::before{content:"\25b6";font-size:11px;color:var(--muted);transition:transform .15s}
.algemeen-blok[open] summary::before{transform:rotate(90deg)}
.algemeen-blok .blok-inhoud{padding:0 16px 14px}
.rapport-split{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
@media(max-width:1100px){.rapport-split{grid-template-columns:1fr}}
/* twee hoofdtabs in rapport (rapport-hoofdtabs-codex) */
.rap-hoofdtabs{display:flex;gap:8px;margin:16px 0 14px}
.rap-hoofdtab{flex:1;border:1.5px solid var(--line);background:#f5f3ee;color:var(--muted);padding:12px 16px;border-radius:10px;cursor:pointer;font-weight:800;font-size:14.5px;font-family:inherit;text-align:center}
.rap-hoofdtab:hover{background:#ece9e2}
.rap-hoofdtab.actief{background:var(--green2);color:var(--text);border-color:var(--green)}
/* puntenboek (puntenboek-codex) */
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:700px){.grid3{grid-template-columns:1fr}}
.pt-invoer-rij{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #eef1f5}
.pt-invoer-rij:last-child{border-bottom:none}
.pt-naam{flex:1;font-weight:600;font-size:14px}
.pt-blok{margin-bottom:18px;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.pt-blok-kop{background:#f5f3ee;padding:10px 14px;font-weight:800;font-size:14.5px}
.pt-tabel-wrap{overflow-x:auto}
.pt-tabel{border-collapse:collapse;width:100%;font-size:13px;min-width:480px}
.pt-tabel th,.pt-tabel td{padding:7px 10px;text-align:center;border-bottom:1px solid #eef1f5;border-right:1px solid #f3f5f8}
.pt-tabel th{background:#fbfcfb;font-size:11px;color:var(--muted);font-weight:800;vertical-align:top}
.pt-sub{font-weight:600;color:#9aa3ad;font-size:10px}
.pt-naam-cel{text-align:left;font-weight:700;white-space:nowrap}
.pt-tabel th.pt-naam-cel{background:#fbfcfb}
.pt-gem{font-weight:800;color:#3c4a5c;background:#fafbfc}
.pt-ster{white-space:nowrap;background:#fffdf5}
.pt-leeg{color:#cbd2da}
.pt-x{border:none;background:none;color:#c46;cursor:pointer;font-size:14px;font-weight:800;padding:0 2px;margin-left:2px}
.pt-x:hover{color:#a02}
.pt-ster-toon{padding:6px 0 4px;font-size:14px}
</style>

<body>
<header>
  <div class="brand">
    <img src="afbeeldingen/schoollogo.png" alt="Schoollogo" onerror="this.style.display='none'">
    <div><h1>Groeigroepen</h1><div id="status" class="sub">Laden...</div></div>
  </div>
  <div class="row">
    <input id="schooljaar" style="width:112px" aria-label="Schooljaar">
    <a class="button ghost" href="index.html">Home</a>
    <button id="logoutBtn" class="ghost">Uitloggen</button>
  </div>
</header>

<main>
  <aside class="panel sidebar">
    <div class="side-head">
      <h2>Groepen</h2>
      <button id="newGroupBtn" class="secondary small">Nieuwe groep</button>
    </div>
    <input id="groupSearch" placeholder="Zoek groep of leerling...">
    <div id="groups" class="groups" style="margin-top:12px"></div>
  </aside>

  <section class="panel">
    <div id="emptyState" class="empty">Kies links een groeigroep of maak een nieuwe groep.</div>
    <div id="workspace" class="hidden">
      <div class="row" style="justify-content:space-between;margin-bottom:12px">
        <div>
          <h2 id="groupTitle">Groeigroep</h2>
          <div id="groupMeta" class="muted"></div>
        </div>
        <div class="row no-print">
          <button id="carryGroupBtn" class="ghost">Naar volgend schooljaar</button>
          <button id="saveGroupBtn" class="secondary">Bewaren</button>
          <button id="deleteGroupBtn" class="danger">Verwijderen</button>
        </div>
      </div>
      <div class="tabs no-print">
        <button class="tab active" data-tab="basis">Basis</button>
        <button class="tab" data-tab="leerlingen">Leerlingen</button>
        <button class="tab" data-tab="logboek">Logboek</button>
        <button class="tab" data-tab="toetsen">Toetsjes</button>
        <button class="tab" data-tab="rapport">Rapport</button>
      </div>
      <div id="tab-basis" class="tabPanel"></div>
      <div id="tab-leerlingen" class="tabPanel hidden"></div>
      <div id="tab-logboek" class="tabPanel hidden"></div>
      <div id="tab-toetsen" class="tabPanel hidden"></div>
      <div id="tab-rapport" class="tabPanel hidden"></div>
    </div>
  </section>
</main>

// begeleiders-naam-codex: zet een ingevulde naam of e-mailadres om naar "juf Lotte"-vorm
function mooiBegeleider(ruw){
  let v=String(ruw||"").trim();
  if(!v) return "";
  if(v.includes("@")) v=v.split("@")[0];          // e-mail -> deel voor @
  v=v.replace(/[._]+/g," ").trim();                // lotte.debruyn -> lotte debruyn
  // bestaande aanspreking (juf/meester/...) eraf halen, we zetten ze zelf terug
  let titel="juf";
  const m=v.match(/^(juf|meester|mr|meneer|mevr|mevrouw|dhr)\b\.?\s*/i);
  if(m){ const t=m[1].toLowerCase(); titel=(t==="meester"||t==="mr"||t==="meneer"||t==="dhr")?"meester":"juf"; v=v.slice(m[0].length).trim(); }
  const voornaam=(v.split(" ")[0]||"").trim();
  if(!voornaam) return "";
  const net=voornaam.charAt(0).toUpperCase()+voornaam.slice(1).toLowerCase();
  return `${titel} ${net}`;                        // bv. "juf Lotte" of "meester Tom"
}

// verzamelt alle begeleiders: handmatig veld + iedereen die in het logboek schreef
function alleBegeleiders(groep){
  const set=new Map();
  String(groep?.begeleiders||"").split(/[,;]+/).map(x=>x.trim()).filter(Boolean).forEach(x=>{
    const m=mooiBegeleider(x); if(m) set.set(m.toLowerCase(),m);
  });
  (groep?.logboek||[]).forEach(l=>{
    const m=mooiBegeleider(l.auteur); if(m) set.set(m.toLowerCase(),m);
  });
  (groep?.toetsen||[]).forEach(t=>{
    const m=mooiBegeleider(t.auteur); if(m) set.set(m.toLowerCase(),m);
  });
  return [...set.values()].join(", ");
}

const studentKey=s=>`${s.klas}__${s.leerlingId}`;
function studentNaam(s){
  const id=String(s.leerlingId||s.id||"");
  const first=String(s.firstName||s.first||s.voornaam||"").trim();
  const last=String(s.lastName||s.last||s.achternaam||"").trim();
  const direct=String(s.naam||s.name||s.fullName||s.volledigeNaam||"").trim();
  if(first||last) return last ? `${last}, ${first}`.replace(/, $/,"") : first;
  if(direct && direct!==id) return direct;
  return "Naam ontbreekt";
}
function studentUitKlas(klas,s){
  const leerlingId=String(s.id||s.leerlingId||uid());
  const item={
    klas,
    leerlingId,
    firstName:s.firstName||s.first||s.voornaam||"",
    lastName:s.lastName||s.last||s.achternaam||""
  };
  item.naam=studentNaam({...s,...item});
  return item;
}
function naamMatchKey(s){
  const first=String(s.firstName||s.first||s.voornaam||"").trim().toLowerCase();
  const last=String(s.lastName||s.last||s.achternaam||"").trim().toLowerCase();
  if(first||last) return `${first}|${last}`;
  const naam=String(s.naam||s.name||s.fullName||s.volledigeNaam||"").replace(/\s+/g," ").trim().toLowerCase();
  return naam.includes(",")
    ? naam.split(",").map(x=>x.trim()).reverse().join("|")
    : naam;
}
function verrijkLeerling(s){
  const huidigeNaam=String(s.naam||"").trim();
  const mistNaam=!huidigeNaam||huidigeNaam==="Naam ontbreekt"||huidigeNaam===String(s.leerlingId||"");
  if(!mistNaam) return s;
  const bron=(classes[s.klas]?.leerlingen||[]).find(x=>String(x.id||x.leerlingId)===String(s.leerlingId));
  return bron ? studentUitKlas(s.klas,bron) : {...s,naam:studentNaam(s)};
}

window.ggPtBewaarToets=async function(){

function renderPtOverzicht(){
  const el=$("ptOverzicht"); if(!el) return;
  const periode=actievePuntenboekPeriode();
  const toetsen=(active.toetsen||[]).filter(t=>toetsHoortBijPeriode(t,periode));
  if(!toetsen.length){ el.innerHTML=`<div class="empty">Nog geen toetsen in het puntenboek${periode?` voor ${esc(periode)}`:""}.</div>`; return; }
  // groepeer toetsen per onderdeel
  const perDomein={};
  toetsen.forEach(t=>{ (perDomein[t.domein]=perDomein[t.domein]||[]).push(t); });
  const volgorde=DOMAINEN.map(d=>d.id).filter(id=>perDomein[id]);
  el.innerHTML=volgorde.map(domId=>{
    const lijst=perDomein[domId].slice().sort((a,b)=>(a.datum||"").localeCompare(b.datum||""));
    const def=DOMAINEN.find(d=>d.id===domId)||{};
    const kop=lijst.map(t=>`<th title="${esc(t.titel)}">${esc(t.titel)}<br><span class="pt-sub">${t.type==="sterren"?"\u2b50":("/"+t.max)} \u00d7${t.gewicht}</span> <button class="pt-x" onclick="window.ggPtVerwijderToets('${t.id}')" title="Toets verwijderen">\u00d7</button></th>`).join("");
    const rijen=active.leerlingen.map(s=>{
      const k=studentKey(s);
      const cellen=lijst.map(t=>{
        const r=t.resultaten?.[k];
        if(r==null||r==="") return `<td class="pt-leeg">\u2013</td>`;
        return `<td>${t.type==="sterren"?("\u2b50".repeat(Number(r))):esc(r)}</td>`;
      }).join("");
      const gem=gemiddeldPercentVoorOnderdeel(domId,k,periode);
      const ster=sterrenUitPuntenboek(domId,k,periode);
      const gemToon=gem==null?"\u2013":(Math.round(gem)+"%");
      return `<tr><td class="pt-naam-cel">${esc(studentNaam(s))}</td>${cellen}<td class="pt-gem">${gemToon}</td><td class="pt-ster">${sterrenHtml(ster)}</td></tr>`;
    }).join("");
    return `<div class="pt-blok">
      <div class="pt-blok-kop">${domainEmoji(domId)} ${esc(def.naam||domId)} <span class="muted" style="font-weight:400">(${esc(def.groep||"")})</span></div>

        ${rijen}
      </table></div>
    </div>`;
  }).join("");
}

function heeftRapportInhoud(key){
  // toetsen in het puntenboek tellen ook als 'ingevuld'
  const heeftToets=(active.toetsen||[]).some(t=>t.resultaten?.[key]!=null&&t.resultaten?.[key]!=="");

function studentReport(key){
  if(!active.rapporten[key]) active.rapporten[key]={};

function actieveRapportDomeinenVoorStudent(key){

  const domains=actieveRapportDomeinenVoorStudent(key);
  const idx=active.leerlingen.findIndex(x=>studentKey(x)===key);

// ===== Puntenboek-omrekening (puntenboek-codex) =====
// percentage -> sterren volgens de afgesproken grenzen
function percentNaarSterren(p){
  if(p==null||isNaN(p)) return 0;
  if(p>=90) return 4;
  if(p>=70) return 3;
  if(p>=50) return 2;
  return 1;
}
// een sterren-toets telt mee als dit vaste percentage (midden van elke klasse)
function sterrenNaarPercent(s){
  return ({1:25,2:55,3:75,4:95})[Number(s)] ?? null;
}
// zet 1 toetsresultaat van 1 kind om naar een percentage (punten of sterren)
function toetsResultaatPercent(toets, leerlingKey){
  const r=toets.resultaten?.[leerlingKey];
  if(r==null||r==="") return null;
  if(toets.type==="sterren"){
    return sterrenNaarPercent(r);
  }
  // punten: score / max * 100
  const score=Number(r);
  const max=Number(toets.max)||10;
  if(isNaN(score)||max<=0) return null;
  return Math.max(0,Math.min(100,(score/max)*100));
}
// gewogen gemiddelde-percentage van alle toetsen van 1 onderdeel voor 1 kind
function gemiddeldPercentVoorOnderdeel(domeinId, leerlingKey, periode=huidigeRapportPeriode()){
  let somGewicht=0, somGewogen=0;
  (active.toetsen||[]).forEach(t=>{
    if(t.domein!==domeinId) return;
    if(!toetsHoortBijPeriode(t,periode)) return;
    const p=toetsResultaatPercent(t, leerlingKey);
    if(p==null) return;
    const g=Number(t.gewicht)||1;
    somGewogen+=p*g; somGewicht+=g;
  });
  if(somGewicht===0) return null;
  return somGewogen/somGewicht;
}
// eindster van 1 onderdeel voor 1 kind op basis van het puntenboek
function sterrenUitPuntenboek(domeinId, leerlingKey, periode=huidigeRapportPeriode()){
  const p=gemiddeldPercentVoorOnderdeel(domeinId, leerlingKey, periode);
  return p==null?0:percentNaarSterren(p);
}

function veiligeBestandsnaam(text){
  return String(text||"rapport").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9_-]+/gi,"_").replace(/^_+|_+$/g,"")||"rapport";
}
async function imageAsDataUrl(url){
  try{
    const res=await fetch(url);
    if(!res.ok) return "";
    const blob=await res.blob();
    return await new Promise(resolve=>{
      const reader=new FileReader();
      reader.onload=()=>resolve(reader.result);
      reader.onerror=()=>resolve("");
      reader.readAsDataURL(blob);
    });
  }catch(e){return "";}
}

async function downloadCurrentReportPdf(){
  collectCurrentChildReport();
  const key=currentReportKey();
  const report=active.rapporten[key]||studentReport(key);
  const s=studentByKey(key);
  const groep=active.rapportGroep||{};
  const doelen=groep.doelen||{};
  const domeinen=actieveRapportDomeinenVoorStudent(key);
  if(typeof html2pdf==="undefined") return alert("PDF maken lukt niet omdat de PDF-bibliotheek niet geladen is. Controleer je internetverbinding en herlaad de pagina.");

  setStatus(`Groeirapport maken van ${s?.naam||"leerling"}...`);
  const logoUrl=active?.rapportLogoDataUrl||await imageAsDataUrl("afbeeldingen/schoollogo.png");
  const html=bouwGroeirapportHtml({s,groep,doelen,domeinen,report,logoUrl,leerlingKey:key});

  // off-screen renderen, achter de pagina (z-index negatief) zodat capture-coordinaten kloppen
  const houder=document.createElement("div");
  houder.style.cssText="position:absolute;left:0;top:0;width:720px;background:#fff;z-index:-99999";
  houder.innerHTML=html;
  document.body.appendChild(houder);

  // Twemoji: alle emoji's -> afbeeldingen (emoji-proof, geen vreemde tekens)
  try{ if(window.twemoji) twemoji.parse(houder,{folder:"72x72",ext:".png"}); }catch(e){}
  // wachten tot de Twemoji-afbeeldingen geladen zijn voor we de foto nemen
  await new Promise(res=>{
    const imgs=[...houder.querySelectorAll("img")];
    if(!imgs.length) return res();
    let n=imgs.length;
    const klaar=()=>{ if(--n<=0) res(); };
    imgs.forEach(img=>{ if(img.complete) klaar(); else { img.onload=klaar; img.onerror=klaar; } });
    setTimeout(res,3000); // veiligheidsnet
  });

  const bestandsnaam=`Groeirapport_${veiligeBestandsnaam(s?.naam)}_${veiligeBestandsnaam(groep.periode)}.pdf`;
  try{
    await html2pdf().set({
      margin:[12,10,14,10],
      filename:bestandsnaam,
      image:{type:"jpeg",quality:0.96},
      html2canvas:{scale:2,useCORS:true,backgroundColor:"#ffffff",scrollX:0,scrollY:0},
      jsPDF:{unit:"mm",format:"a4",orientation:"portrait"},
      pagebreak:{mode:["css","legacy"],avoid:["tr","h2.gr-domein",".gr-traject",".gr-kind"]}
    }).from(houder.querySelector("#grpdfWrap")).save();
    setStatus(`Groeirapport gedownload: ${bestandsnaam}`);
  }catch(e){
    console.error("PDF mislukt",e);
    alert("Het groeirapport kon niet gemaakt worden. Probeer het opnieuw.");
  }finally{
    houder.remove();
  }
}

    overgenomenVanSchooljaar:huidig,
    leerlingen,
    logboek:(active.logboek||[]).map(item=>({...item,evaluaties:remapObjectKeys(item.evaluaties)})),
    toetsen:[],
    rapporten:{},
    rapportPeriodes:{},
    rapportGroep:{},
    bewaarTot:bewaarTotVoorSchooljaar(volgend),
    bewaartermijnJaren:BEWAAR_JAREN_GROEIGROEP_LOGBOEK,
    bewaardoor:"logboek zorgtraject",
    createdAt:new Date().toISOString(),
    updatedAt:new Date().toISOString(),
    updatedBy:user.email||user.uid
  };
  await setDoc(groupRef(copied.id),{...copied,updatedAt:serverTimestamp()},{merge:true});
  $("schooljaar").value=volgend;
  active=copied;
  await reloadAll();
  active=groups.find(g=>g.id===copied.id)||copied;
  renderGroups();
  renderWorkspace();
  setStatus(`Overgenomen naar ${volgend}: ${matched}/${leerlingen.length} leerling(en) teruggevonden in nieuwe klaslijsten.`);
}
window.ggToggleStudent=async(klas,id,checked)=>{
  const c=classes[klas];const src=(c.leerlingen||[]).find(s=>String(s.id)===String(id));if(!src)return;
  const s=studentUitKlas(klas,src);
  active.leerlingen=checked?[...active.leerlingen.filter(x=>studentKey(x)!==studentKey(s)),s]:active.leerlingen.filter(x=>studentKey(x)!==studentKey(s));
  renderChosenStudentsBasket();
  renderGroups();
  await persistActiveGroup("Leerlingen bewaard");
};
window.ggRemoveStudent=async key=>{
  active.leerlingen=active.leerlingen.filter(s=>studentKey(s)!==key);
  const checkbox=document.querySelector(`[data-student-key="${CSS.escape(key)}"]`);
  if(checkbox) checkbox.checked=false;
  renderChosenStudentsBasket();
  renderGroups();
  await persistActiveGroup("Leerlingen bewaard");
};
window.ggAddLog=async()=>{
  const evals={};
  const domeinen=gekozenLogDomeinen();
  if(!domeinen.length) return alert("Kies eerst minstens een onderdeel, bijvoorbeeld lezen of spelling.");
  active.leerlingen.forEach(s=>{
    const k=studentKey(s);
    const perDomein={};
    domeinen.forEach(id=>{perDomein[id]={score:$(`log_${k}_${id}`)?.value||""};});
    evals[k]={domeinen:perDomein,opmerking:$(`opm_${k}`)?.value||""};
  });
  active.logboek.push({id:uid(),datum:$("logDatum").value||today(),titel:$("logTitel").value||"Notitie",tekst:$("logTekst").value||"",domeinen,auteur:user.email||"",evaluaties:evals});
  await saveGroup();tab="logboek";renderWorkspace();
};
window.ggRenderRapportStudent=()=>renderRapportStudent();
// groepsdoelen verversen bij aan/uitvinken onderdeel (in de groep-tab, geen kind-editor)
window.ggRenderRapportGroepDoelen=()=>{
  // bewaar de huidige doel-teksten + aangevinkte onderdelen in active.rapportGroep
  collectRapportGroup();
  renderRapportGroepDoelen();
};
window.ggSaveReport=async()=>{
  collectCurrentChildReport();
  bewaarHuidigeRapportPeriode();
  const key=currentReportKey();
  renderReportPreview(key,active.rapporten[key]);
  // tab-vinkje van dit kind bijwerken zonder de hele tab te herbouwen
  const tabBtn=document.querySelector(`.lln-tab[data-llnkey="${CSS.escape(key)}"]`);
  if(tabBtn&&heeftRapportInhoud(key)&&!tabBtn.querySelector(".vink")) tabBtn.insertAdjacentHTML("beforeend",'<span class="vink">\u2713</span>');
  await saveGroup();
};
window.ggSaveAndNextReport=async()=>{
  collectCurrentChildReport();
  bewaarHuidigeRapportPeriode();
  const key=currentReportKey();
  const idx=active.leerlingen.findIndex(s=>studentKey(s)===key);
  await saveGroup();
  const next=active.leerlingen[Math.min(idx+1,active.leerlingen.length-1)]||active.leerlingen[0];
  renderRapport(); // herbouwt tabs incl. nieuw \u2713 op het zojuist ingevulde kind
  window.ggOpenReportStudent(studentKey(next));
};
window.ggRapportVorige=()=>{
  collectCurrentChildReport();
  const key=currentReportKey();
  const idx=active.leerlingen.findIndex(s=>studentKey(s)===key);
  const prev=active.leerlingen[Math.max(idx-1,0)]||active.leerlingen[0];
  renderRapport();
  window.ggOpenReportStudent(studentKey(prev));
};
window.ggDownloadReportPdf=async()=>{
  await window.ggSaveReport();
  await downloadCurrentReportPdf();
};

$("newGroupBtn").onclick=async()=>{
  active=emptyGroup();
  groups=[active,...groups];
  tab="basis";
  renderGroups();
  renderWorkspace();
  try{await saveGroup();}catch(e){}
};
$("carryGroupBtn").onclick=carryActiveGroupToNextYear;
$("saveGroupBtn").onclick=saveGroup;
$("deleteGroupBtn").onclick=async()=>{if(!active||!confirm("Deze groeigroep verwijderen?"))return;await deleteDoc(groupRef(active.id));active=null;await loadGroups();renderWorkspace();};
$("groupSearch").oninput=renderGroups;
$("schooljaar").onchange=reloadAll;
$("logoutBtn").onclick=()=>signOut(auth);
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));

onAuthStateChanged(auth,async u=>{
  if(!u){location.href="index.html";return;}
  user=u;
  try{await loadRole();await reloadAll();}
  catch(e){setStatus("Geen toegang");$("groups").innerHTML="";$("emptyState").innerHTML=`<div class="empty">${esc(e.message)}</div>`;}
});
</script>
</body>
</html>
